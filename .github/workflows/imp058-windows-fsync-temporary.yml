name: Apply IMP-058 Windows fsync fix

on:
  pull_request:
    paths:
      - .github/scripts/fix_imp058_windows_fsync.py
      - .github/workflows/imp058-windows-fsync-temporary.yml

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: imp-058-shutdown-escape-bundle
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Apply Windows fsync handle fix
        run: python .github/scripts/fix_imp058_windows_fsync.py
      - name: Commit fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/doll/shutdown_escape.py
          git commit -m "Fix shutdown escape fsync on Windows"
          git push origin HEAD:imp-058-shutdown-escape-bundle
