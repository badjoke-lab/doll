name: Fix IMP-041 coverage fixture

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/imp-041-coverage-fix.yml"

permissions:
  contents: write

jobs:
  fix:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: imp-041-work-item-record
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v6
      - run: uv sync --dev --locked
      - name: Apply fixture fix
        run: python scripts/imp_041_fix_coverage_fixture.py
      - name: Ruff
        run: |
          uv run ruff check . --fix
          uv run ruff format .
          uv run ruff check .
      - name: Strict typing
        run: uv run mypy src tests
      - name: Focused tests
        run: uv run pytest -q --no-cov tests/test_work_item.py tests/test_work_item_coverage.py tests/test_work_item_validation_coverage.py tests/test_state_package_v2.py
      - name: Commit fix
        run: |
          rm scripts/imp_041_fix_coverage_fixture.py
          rm .github/workflows/imp-041-coverage-fix.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Strengthen IMP-041 defensive coverage"
          git push origin HEAD:imp-041-work-item-record
