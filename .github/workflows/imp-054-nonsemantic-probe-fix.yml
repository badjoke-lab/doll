name: IMP-054 nonsemantic probe fixer

on:
  push:
    branches:
      - fix-imp-054-nonsemantic-probe
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  diagnose:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix-imp-054-nonsemantic-probe
      - name: Record replacement counts
        run: |
          python - <<'PY'
          from pathlib import Path
          import json
          import re

          model = Path("src/doll/model_switch.py").read_text(encoding="utf-8")
          tests = Path("tests/test_model_switch.py").read_text(encoding="utf-8")
          probe = Path("scripts/imp_054_runtime_probe.py").read_text(encoding="utf-8")
          imp052 = Path("docs/implementation/imp-052-explicit-model-switch-and-fallback.md").read_text(encoding="utf-8")
          imp054 = Path("docs/implementation/imp-054-real-runtime-continuity-drill.md").read_text(encoding="utf-8")

          fallback = '''            switch = ModelSwitchService(repository, boundary).switch_to_fallback(
                  scope_type="conversation",
                  scope_key="imp054",
                  target_binding_id=identifiers["fallback_binding_id"],
                  operation_id="imp054.switch.to-fallback",
              )
              third = non_streaming.execute_turn(
          '''
          rollback = '''            rollback = ModelSwitchService(repository, rollback_boundary).switch_binding(
                  scope_type="conversation",
                  scope_key="imp054",
                  target_binding_id=identifiers["primary_binding_id"],
                  operation_id="imp054.switch.forced-rollback",
              )
              rollback_probe_calls = rollback_adapter.probe_calls
          '''
          doc052 = "A completed response must be one non-empty uppercase ASCII token ending in `_SWITCH_OK`, with no prose, quotation, punctuation, Markdown, or multiline content. The prefix may vary because real local models can harmlessly normalize an unfamiliar fixed token while still proving bounded machine-readable generation. Timeout, cancellation, resource limit, adapter failure, empty output, explanation text, malformed output, or any response outside that bounded token grammar becomes a normalized failure code."
          doc054 = "The runner does not install or start Ollama. It does not pull, delete, modify, or select models automatically. Each selected model must complete the fixed bounded probe and return one non-empty uppercase ASCII token ending in `_SWITCH_OK`. A harmless uppercase prefix variation is accepted because real models can normalize an unfamiliar fixed token; empty output, prose, punctuation, Markdown, malformed output, timeout, or runtime failure is rejected. The probe allows 60 seconds for CPU-only model loading and generation."

          result = {
              "constants": len(re.findall(r'MODEL_SWITCH_PROBE_INPUT = \(.*?\n\)\nMODEL_SWITCH_PROBE_MAX_OUTPUT_CHARS = 64\nMODEL_SWITCH_PROBE_TIMEOUT_SECONDS = 60\.0\n_MODEL_SWITCH_PROBE_RESPONSE = re\.compile\(r".*?"\)\n', model, flags=re.DOTALL)),
              "validator": len(re.findall(r'def validate_model_switch_probe_output\(value: object\) -> bool:\n.*?\n\n\n@dataclass', model, flags=re.DOTALL)),
              "wrong_response": tests.count('"wrong response"'),
              "fallback": probe.count(fallback),
              "rollback": probe.count(rollback),
              "doc052": imp052.count(doc052),
              "doc054": imp054.count(doc054),
          }
          Path(".github/imp054-fixer-diagnostic.json").write_text(
              json.dumps(result, sort_keys=True, separators=(",", ":")) + "\n",
              encoding="utf-8",
          )
          PY
      - name: Commit diagnostic
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add .github/imp054-fixer-diagnostic.json
          git commit -m "Record IMP-054 fixer diagnostic"
          git push origin HEAD:fix-imp-054-nonsemantic-probe
