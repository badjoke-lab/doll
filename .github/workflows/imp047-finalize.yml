name: IMP-047 Finalize

on:
  push:
    branches:
      - imp-047-phase4b-acceptance

permissions:
  contents: write

jobs:
  finalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: imp-047-phase4b-acceptance
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Finalize roadmap and generated specification
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          roadmap_path = Path("docs/spec/09-development-roadmap.md")
          roadmap = roadmap_path.read_text(encoding="utf-8")
          replacements = {
              "- IMP-030 through IMP-046;": "- IMP-030 through IMP-047;",
              "- local workspace, SQLite state, migrations, managed artifacts, preferences, policies, permissions, confirmed memory, projects, decisions, state-package v2 export with v1 read compatibility, a versioned authoritative record registry, ProjectRecord v2 with v1 read compatibility, WorkItemRecord v1 lifecycle and dependency integrity, and ProcedureRecord v1 lifecycle and non-authority guarantees, ProjectCheckpointRecord v1 confirmation and freshness, deterministic derived project status, deterministic project-scoped Resume Bundle export, and project-continuity transfer and recovery coverage, verified backup, restore, continuity acceptance, the model-independent safety boundary, canonical conversation and event state, portability adapter and result records, generic import staging, generic export, reviewed publication, source preservation, idempotency, loss visibility, and Phase 4A acceptance evidence.": "- local workspace, SQLite state, migrations, managed artifacts, preferences, policies, permissions, confirmed memory, projects, decisions, state-package v2 export with v1 read compatibility, a versioned authoritative record registry, ProjectRecord v2 with v1 read compatibility, WorkItemRecord v1 lifecycle and dependency integrity, and ProcedureRecord v1 lifecycle and non-authority guarantees, ProjectCheckpointRecord v1 confirmation and freshness, deterministic derived project status, deterministic project-scoped Resume Bundle export, project-continuity transfer and recovery coverage, and automated Phase 4B acceptance evidence, verified backup, restore, continuity acceptance, the model-independent safety boundary, canonical conversation and event state, portability adapter and result records, generic import staging, generic export, reviewed publication, source preservation, idempotency, loss visibility, and Phase 4A acceptance evidence.",
              "- IMP-046 adds integrated package, backup, restore, fresh-process, imported-content, compatibility, and secret-safe output coverage for project continuity;\n- the next bounded Phase 4B implementation issue receives IMP-047;\n- local model execution begins only after Phase 4B passes.": "- IMP-046 adds integrated package, backup, restore, fresh-process, imported-content, compatibility, and secret-safe output coverage for project continuity;\n- IMP-047 adds automated PROJ-001 through PROJ-012 acceptance evidence, an independent Resume Bundle inspector, and an exact-commit primary Intel Mac offline runner;\n- the primary Intel Mac offline gate remains pending;\n- no Phase 5 implementation identifier is assigned until Phase 4B passes;\n- local model execution begins only after Phase 4B passes.",
              "Status: in progress through IMP-046.": "Status: automated acceptance evidence implemented through IMP-047; primary Intel Mac gate pending.",
              "- IMP-046 — project-continuity transfer and recovery coverage.": "- IMP-046 — project-continuity transfer and recovery coverage.\n- IMP-047 — automated PROJ-001 through PROJ-012 acceptance evidence, independent Resume Bundle inspection, and an exact-commit primary Intel Mac offline runner.",
              "Remaining implementation slices, with identifiers assigned only when scheduled:\n\n1. PROJ-001 through PROJ-012 acceptance evidence.": "Remaining gate step:\n\n1. Run the exact merged `main` commit on the primary Intel Mac with networking disabled, store the accepted result in a separate completion PR, and only then mark Phase 4B complete.",
              "The required order after the Phase 4A gate is:\n\n1. schedule the first bounded Phase 4B package-v2 and project-continuity slice as IMP-038;\n2. continue Phase 4B with monotonically increasing identifiers;\n3. pass the Phase 4B project-continuity gate;\n4. schedule local runtime and model integration slices with the next monotonic identifiers;\n5. prove a real local AI migration path before provider-specific cloud portability becomes a primary claim.": "The required order after the Phase 4A gate is:\n\n1. merge the pending IMP-047 automated Phase 4B acceptance evidence without claiming the phase complete;\n2. run the exact merged `main` commit on the primary Intel Mac with networking disabled;\n3. store the accepted real-machine result in a separate completion PR and mark Phase 4B complete;\n4. schedule local runtime and model integration slices with the next monotonic identifiers only after the Phase 4B gate passes;\n5. prove a real local AI migration path before provider-specific cloud portability becomes a primary claim.",
          }
          for old, new in replacements.items():
              if old not in roadmap:
                  raise SystemExit(f"missing roadmap replacement: {old}")
              roadmap = roadmap.replace(old, new)
          roadmap_path.write_text(roadmap, encoding="utf-8")

          checker_path = Path("scripts/check-public-site-status.mjs")
          checker = checker_path.read_text(encoding="utf-8")
          old = '''expect(
            roadmap.includes("the next bounded Phase 4B implementation issue receives IMP-047"),
            "roadmap must identify IMP-047 as next after IMP-046",
          );'''
          new = '''expect(
            roadmap.includes("the primary Intel Mac offline gate remains pending"),
            "roadmap must keep the IMP-047 primary-machine gate pending",
          );
          expect(
            roadmap.includes("no Phase 5 implementation identifier is assigned until Phase 4B passes"),
            "roadmap must keep Phase 5 blocked until Phase 4B passes",
          );'''
          if old not in checker:
              raise SystemExit("missing public-site checker replacement")
          checker_path.write_text(checker.replace(old, new), encoding="utf-8")
          PY

          python scripts/build_final_spec.py
          python scripts/build_final_spec.py --check
          node scripts/check-public-site-status.mjs
          git diff --check

      - name: Commit finalized branch
        shell: bash
        run: |
          rm .github/workflows/imp047-finalize.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add docs/spec/09-development-roadmap.md scripts/check-public-site-status.mjs DOLL_FINAL_SPEC.md .github/workflows/imp047-finalize.yml
          git commit -m "docs: record pending Phase 4B real-machine gate"
          git push origin HEAD:imp-047-phase4b-acceptance
