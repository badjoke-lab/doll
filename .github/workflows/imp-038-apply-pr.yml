name: Apply IMP-038 patches

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Apply implementation
        run: |
          git apply --check scripts/imp-038-state-package.patch
          git apply --check scripts/imp-038-roadmap-status.patch
          git apply scripts/imp-038-state-package.patch
          git apply scripts/imp-038-roadmap-status.patch
          python scripts/build_final_spec.py
          python -m compileall -q src tests
          node scripts/check-public-site-status.mjs
          git diff --check

      - name: Publish implementation commit
        run: |
          rm scripts/imp-038-state-package.patch
          rm scripts/imp-038-roadmap-status.patch
          rm .github/workflows/imp-038-apply.yml
          rm .github/workflows/imp-038-apply-retry.yml
          rm .github/workflows/imp-038-apply-pr.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "IMP-038: add state package v2 foundation"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
