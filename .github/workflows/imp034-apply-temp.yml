name: IMP-034 apply validated patch

on:
  pull_request:

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'imp-034-generic-import-staging'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: imp-034-generic-import-staging
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: astral-sh/setup-uv@v6
      - run: uv sync --dev --locked
      - name: Apply generated patch
        run: |
          if grep -q 'occurrence_indexes: dict' src/doll/generic_import.py; then
            exit 0
          fi
          echo '' | base64 -d | gzip -d > /tmp/imp034.patch
          git apply --check /tmp/imp034.patch
          git apply /tmp/imp034.patch
      - run: uv run ruff check --fix src/doll/generic_import.py tests/test_generic_import.py tests/test_generic_import_failures.py
      - run: uv run ruff format src/doll/generic_import.py tests/test_generic_import.py tests/test_generic_import_failures.py
      - run: uv run ruff check src/doll/generic_import.py tests/test_generic_import.py tests/test_generic_import_failures.py
      - run: uv run pytest tests/test_generic_import.py tests/test_generic_import_failures.py --no-cov
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Fix IMP-034 staging invariants
          file_pattern: src/doll/generic_import.py tests/test_generic_import.py tests/test_generic_import_failures.py
