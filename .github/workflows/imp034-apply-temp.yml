name: IMP-034 cleanup temporary workflows

on:
  pull_request:

permissions:
  contents: write

jobs:
  cleanup:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'imp-034-generic-import-staging'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: imp-034-generic-import-staging
      - run: rm -f .github/workflows/imp034-fix-temp.yml .github/workflows/imp034-apply-temp.yml .github/workflows/imp034-diagnostic-temp.yml
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Remove temporary IMP-034 workflows
          file_pattern: .github/workflows/imp034-*.yml
