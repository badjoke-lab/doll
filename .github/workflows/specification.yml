name: Specification

on:
  pull_request:
    paths:
      - "docs/spec/**"
      - "scripts/build_final_spec.py"
      - "DOLL_FINAL_SPEC.md"
      - ".github/workflows/specification.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-specification:
    runs-on: ubuntu-latest
    steps:
      - name: Check out pull request branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build combined specification
        run: python scripts/build_final_spec.py

      - name: Commit generated specification when changed
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        shell: bash
        run: |
          if git diff --quiet -- DOLL_FINAL_SPEC.md && git ls-files --error-unmatch DOLL_FINAL_SPEC.md >/dev/null 2>&1; then
            echo "Generated specification is already current."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add DOLL_FINAL_SPEC.md
          git commit -m "Generate combined specification"
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"

      - name: Upload generated specification
        uses: actions/upload-artifact@v4
        with:
          name: doll-final-specification
          path: DOLL_FINAL_SPEC.md
          if-no-files-found: error
