name: IMP-051 checker

on:
  pull_request:

permissions:
  contents: write

jobs:
  update:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: imp-051-canonical-local-conversation
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Apply update
        run: python scripts/imp051_update_public_checker.py
      - name: Commit
        run: |
          rm scripts/imp051_update_public_checker.py
          rm .github/workflows/imp051-checker.yml
          git config user.name automation
          git config user.email automation@users.noreply.github.com
          git add -A
          git commit -m "docs: align IMP-051 public status checks"
          git push origin HEAD:imp-051-canonical-local-conversation
