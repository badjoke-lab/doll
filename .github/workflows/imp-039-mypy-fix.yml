name: Fix IMP-039 mypy

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/imp-039-mypy-fix.yml"

permissions:
  contents: write

jobs:
  fix:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: imp-039-state-package-record-registry
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v6
      - run: uv sync --dev --locked
      - name: Apply mypy fixes
        run: |
          python scripts/imp_039_fix_mypy.py
          uv run ruff check . --fix
          uv run ruff format .
          uv run ruff check .
          uv run mypy src tests
          git diff --check
      - name: Commit fixes and remove diagnostics
        run: |
          rm scripts/imp_039_fix_mypy.py
          rm docs/implementation/imp-039-mypy-diagnostic.txt
          rm .github/workflows/imp-039-mypy-diagnose.yml
          rm .github/workflows/imp-039-mypy-fix.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Fix IMP-039 strict typing"
          git push origin HEAD:imp-039-state-package-record-registry
