name: IMP-055 finalize

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  finalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: imp-055-ollama-session-source-adapter
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: astral-sh/setup-uv@v6
      - name: Update Phase 6 status
        run: |
          python - <<'PY'
          from pathlib import Path
          import json

          def replace_once(path: str, old: str, new: str) -> None:
              target = Path(path)
              text = target.read_text(encoding="utf-8")
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"unexpected replacement count for {path}: {count}")
              target.write_text(text.replace(old, new), encoding="utf-8")

          roadmap = Path("docs/spec/09-development-roadmap.md")
          text = roadmap.read_text(encoding="utf-8")
          text = text.replace(
              "- IMP-030 through IMP-054;",
              "- IMP-030 through IMP-055;",
              1,
          )
          text = text.replace(
              "accepted primary Intel Mac offline continuity evidence through IMP-054.",
              "accepted primary Intel Mac offline continuity evidence through IMP-054, and the offline Ollama API session source adapter through IMP-055.",
              1,
          )
          old_current = """- Phase 6 local AI portability and daily-use integration is now ready;
          - the first bounded Phase 6 implementation issue receives IMP-055 when opened;
          - later local migration, cloud, and tool work must continue through the Phase 3 safety boundary and the Phase 4A/4B canonical state contracts."""
          new_current = """- Phase 6 local AI portability and daily-use integration is now in progress;
          - IMP-055 adds an offline source adapter for a documented caller-retained Ollama API session bundle, with exact JSON validation, content-free inventory, original-source hashing, deterministic normalization, explicit attachment-metadata loss, and reuse of the accepted generic staging and reviewed-publication boundary;
          - IMP-055 performs no live Ollama request, application-database read, shell-history read, model import, credential access, cloud request, tool execution, schema migration, or State Package format change;
          - IMP-055 does not complete PORT-013 or a stable local-environment portability claim; a later live capture or supported local-application export path and private primary-machine migration drill remain required;
          - the next bounded Phase 6 implementation receives IMP-056 when its issue is opened;
          - later local migration, cloud, and tool work must continue through the Phase 3 safety boundary and the Phase 4A/4B canonical state contracts."""
          if text.count(old_current) != 1:
              raise SystemExit("roadmap current Phase 6 block not found")
          text = text.replace(old_current, new_current)

          phase6_marker = """## 12. Phase 6 — Local AI portability and daily-use integration

          Goal: prove that doll can enter from, operate across, and exit to documented formats around real local AI use.

          Required sequence, with later non-conflicting implementation identifiers:"""
          phase6_replacement = """## 12. Phase 6 — Local AI portability and daily-use integration

          Goal: prove that doll can enter from, operate across, and exit to documented formats around real local AI use.

          Status: in progress from IMP-055.

          Required sequence, with later non-conflicting implementation identifiers:"""
          if text.count(phase6_marker) != 1:
              raise SystemExit("Phase 6 heading block not found")
          text = text.replace(phase6_marker, phase6_replacement)

          daily_marker = """Daily-use work may then expand writing, editing, summarization, translation, planning, memory review, project and decision workflows, work-item proposals, portability review, accessibility, error clarity, Lite performance, and soak testing."""
          imp055 = """### IMP-055 — Offline Ollama API session source adapter

          Status: implemented with synthetic CI evidence; real local-environment migration evidence remains pending.

          Implemented a source-specific parser for the documented doll-defined `ollama-api-chat-session` version 1 JSON format. The adapter accepts explicit caller-provided bytes only, declares `network_behavior = none`, rejects duplicate keys, non-finite constants, invalid UTF-8, malformed exact shapes, unsupported versions, invalid timestamps and identifiers, and bounded resource violations, and produces a content-free inventory plus the SHA-256 of the exact original bundle.

          Supported conversations, user, assistant, system, and tool-role messages, parent relationships, tool calls, and attachment metadata normalize deterministically into the existing generic portability object model. Imported model identifiers remain non-authoritative source metadata. Attachment bytes are not read, and metadata-only handling produces explicit material loss. Unknown roles, conflicting duplicates, missing parents, and cycles use the accepted quarantine and loss paths.

          The adapter reuses the Phase 4A generic staging, preview, exact-plan approval, source mapping, unchanged-source idempotency, changed-source conflict, original-source preservation, atomic publication, and failure-cleanup boundaries. It introduces no authoritative record type, schema migration, State Package format change, runtime request, process launch, credential path, cloud access, tool execution, capability execution, or automatic authority promotion.

          Synthetic tests prove deterministic inventory and mappings, canonical publication, managed source preservation, unchanged re-import reuse, changed-source conflict without overwrite, malformed and hostile-input handling, and absence of network or runtime dependencies. IMP-055 does not establish a native Ollama export, live capture, tested round trip, PORT-013 completion, or the Phase 6 gate.

          """ + daily_marker
          if text.count(daily_marker) != 1:
              raise SystemExit("Phase 6 daily-use marker not found")
          text = text.replace(daily_marker, imp055)

          old_immediate = """The required order after the Phase 5 gate is:

          1. open the first bounded Phase 6 local-AI portability issue as IMP-055;
          2. select one local AI environment actually used by the project owner and implement its source adapter against the Phase 4A contract;
          3. prove inventory, source provenance, duplicate prevention, quarantine, explicit mapping, and loss reporting with synthetic data before any private migration drill;
          4. prove that imported canonical state remains usable after the original local application is disabled or removed;
          5. keep provider-specific cloud portability, credentials, tools, and automatic cloud fallback outside the local migration gate."""
          new_immediate = """The required order after IMP-055 is:

          1. merge the offline Ollama API session source adapter only after all cross-platform, quality, specification, public-status, numbering, and coverage checks pass;
          2. open the next bounded Phase 6 issue as IMP-056 for an explicit live capture or supported local-application export path that can produce the documented session bundle without reading undeclared private storage;
          3. run the private primary Intel Mac migration drill with synthetic or approved private test content, retrieve imported context through a different approved execution component, and disable or remove the original application;
          4. complete applicable PORT-001, PORT-003, PORT-013, and later PORT-015 evidence before making a stable local-portability or anti-lock-in claim;
          5. keep ChatGPT history, provider-specific cloud portability, credentials, tools, and automatic cloud fallback outside the local migration gate."""
          if text.count(old_immediate) != 1:
              raise SystemExit("roadmap immediate-work block not found")
          roadmap.write_text(text.replace(old_immediate, new_immediate), encoding="utf-8")

          readme = Path("README.md")
          readme_text = readme.read_text(encoding="utf-8")
          old_readme = """Phases 4A, 4B, and 5 are complete. Phase 5 passed its primary Intel Mac offline gate on 2026-06-28 using exact implementation commit `1a5b66b2417d6f3e1eafcd14d2769e9c15d7f96c`: real loopback-only Ollama health and inventory, canonical non-streaming and bounded streaming conversation, explicit fallback switching, exact rollback, State Package v2 transfer, backup restore, and fresh-process inspection without runtime adapters all passed. No cloud credential, external network request, model download, runtime installation, tool execution, or autonomous project mutation was used. Phase 6 local AI portability and daily-use integration is ready, with IMP-055 as the next implementation identifier when its bounded issue is opened. The current position is published through the [live implementation activity endpoint](https://doll.badjoke-lab.com/api/project-status). Unused legacy identifiers IMP-024 through IMP-029 are retired and are not reused."""
          new_readme = """Phases 4A, 4B, and 5 are complete. Phase 6 local AI portability and daily-use integration is in progress from IMP-055. IMP-055 adds an offline parser for a documented caller-retained Ollama API session bundle and reuses the accepted generic staging, provenance, duplicate prevention, quarantine, mapping, loss, reviewed publication, source preservation, and canonical conversation boundaries. It opens no socket or subprocess, reads no application database or shell history, imports no model or credential, and does not complete PORT-013 or claim a native Ollama export. IMP-056 is the next implementation identifier when its bounded issue is opened. The current position is published through the [live implementation activity endpoint](https://doll.badjoke-lab.com/api/project-status). Unused legacy identifiers IMP-024 through IMP-029 are retired and are not reused."""
          if readme_text.count(old_readme) != 1:
              raise SystemExit("README status paragraph not found")
          readme.write_text(readme_text.replace(old_readme, new_readme), encoding="utf-8")

          status = {
              "schema_version": 2,
              "maturity": "Pre-alpha",
              "completed_phases": ["0", "1", "2", "3", "4A", "4B", "5"],
              "phase": {
                  "id": "6",
                  "name": "Local AI portability and daily-use integration",
                  "state": "in_progress",
                  "started_by_implementation": 55,
                  "next_implementation": 56,
              },
              "model_runtime": {
                  "connected": True,
                  "message": "Phase 6 is in progress from IMP-055. The offline Ollama API session source adapter validates and inventories caller-retained local session bundles and reuses the accepted generic portability boundary. Live capture and the PORT-013 real-machine migration drill remain pending.",
              },
              "last_reviewed": "2026-06-28",
          }
          Path("website/project-status.json").write_text(
              json.dumps(status, indent=2) + "\n",
              encoding="utf-8",
          )

          checker = Path("scripts/check-public-site-status.mjs")
          checker_text = checker.read_text(encoding="utf-8")
          old_phase = '''status.phase?.id === "6" &&
              status.phase?.name === "Local AI portability and daily-use integration" &&
              status.phase?.state === "ready" &&
              status.phase?.started_by_implementation === null &&
              status.phase?.next_implementation === 55,
            "project-status.json must mark Phase 6 ready with IMP-055 next",'''
          new_phase = '''status.phase?.id === "6" &&
              status.phase?.name === "Local AI portability and daily-use integration" &&
              status.phase?.state === "in_progress" &&
              status.phase?.started_by_implementation === 55 &&
              status.phase?.next_implementation === 56,
            "project-status.json must mark Phase 6 in progress from IMP-055 with IMP-056 next",'''
          if checker_text.count(old_phase) != 1:
              raise SystemExit("checker phase expectation not found")
          checker_text = checker_text.replace(old_phase, new_phase)
          old_checks = '''expect(
            roadmap.includes("the first bounded Phase 6 implementation issue receives IMP-055 when opened"),
            "roadmap must identify IMP-055 as the next implementation identifier",
          );
          expect(
            roadmap.includes("The required order after the Phase 5 gate is:"),
            "roadmap must advance immediate work to Phase 6",
          );'''
          new_checks = '''expect(
            roadmap.includes("### IMP-055 — Offline Ollama API session source adapter"),
            "roadmap must record the IMP-055 Ollama session source adapter",
          );
          expect(
            roadmap.includes("the next bounded Phase 6 implementation receives IMP-056 when its issue is opened"),
            "roadmap must identify IMP-056 as the next implementation identifier",
          );
          expect(
            roadmap.includes("The required order after IMP-055 is:"),
            "roadmap must advance immediate work beyond IMP-055",
          );'''
          if checker_text.count(old_checks) != 1:
              raise SystemExit("checker roadmap expectations not found")
          checker.write_text(checker_text.replace(old_checks, new_checks), encoding="utf-8")
          PY
      - run: uv sync --locked
      - run: uv run python scripts/build_final_spec.py
      - run: uv run ruff check src/doll/ollama_session_import.py tests/test_ollama_session_import.py
      - run: uv run ruff format --check src/doll/ollama_session_import.py tests/test_ollama_session_import.py
      - run: uv run mypy
      - run: node scripts/check-public-site-status.mjs
      - name: Commit generated Phase 6 state
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add README.md docs/spec/09-development-roadmap.md DOLL_FINAL_SPEC.md website/project-status.json scripts/check-public-site-status.mjs
          git commit -m "Publish IMP-055 Phase 6 status"
          git push origin HEAD:imp-055-ollama-session-source-adapter
