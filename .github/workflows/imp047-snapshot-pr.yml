name: IMP-047 PR Snapshot

on:
  pull_request:

permissions:
  contents: read

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/upload-artifact@v4
        with:
          name: imp047-pr-source
          path: |
            src
            tests
            docs
            scripts
            website
            pyproject.toml
            uv.lock
