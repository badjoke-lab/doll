name: Fix IMP-054 regressions

on:
  push:
    branches:
      - imp-054-real-runtime-continuity-drill

permissions:
  contents: write

jobs:
  fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: imp-054-real-runtime-continuity-drill
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v6
      - run: uv sync --dev --locked
      - name: Patch v1 conversion and runtime descriptor
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace_once(path: str, old: str, new: str) -> None:
              file = Path(path)
              text = file.read_text(encoding="utf-8")
              if new in text:
                  return
              if text.count(old) != 1:
                  raise SystemExit(f"unexpected source in {path}")
              file.write_text(text.replace(old, new, 1), encoding="utf-8")

          replace_once(
              "tests/project_continuity_support.py",
              '        "records/model-bindings.jsonl",\n    ):',
              '        "records/model-bindings.jsonl",\n        "records/conversations.jsonl",\n        "records/conversation-events.jsonl",\n    ):',
          )
          replace_once(
              "tests/project_continuity_support.py",
              '        "model_binding",\n    ):',
              '        "model_binding",\n        "conversation",\n        "conversation_event",\n    ):',
          )
          replace_once(
              "scripts/imp_054_runtime_probe.py",
              '            descriptor = {\n                "memory_id": memory.record_id,',
              '            descriptor = {\n                "inspection_mode": "full",\n                "memory_id": memory.record_id,',
          )
          PY
          uv run ruff format tests/project_continuity_support.py scripts/imp_054_runtime_probe.py
          uv run ruff check tests/project_continuity_support.py scripts/imp_054_runtime_probe.py
      - name: Commit fixes
        run: |
          rm .github/workflows/imp-054-fix-regressions.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git diff --cached --check
          git commit -m "IMP-054: fix package compatibility regressions"
          git push origin HEAD:imp-054-real-runtime-continuity-drill
