name: IMP-034 targeted fix

on:
  pull_request:

permissions:
  contents: write

jobs:
  fix:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'imp-034-generic-import-staging'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: imp-034-generic-import-staging
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: astral-sh/setup-uv@v6
      - run: uv sync --dev --locked
      - name: Apply validated fixes
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          path = Path('src/doll/generic_import.py')
          text = path.read_text()

          def replace_once(old: str, new: str) -> None:
              global text
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'expected one replacement, found {count}: {old[:80]!r}')
              text = text.replace(old, new, 1)

          replace_once(
              '        material_object_indexes: set[int] = set()\n\n        for raw in raw_objects:\n',
              '        material_object_indexes: set[int] = set()\n'
              '        occurrence_indexes: dict[str, tuple[int, ...]] = {}\n\n'
              '        for raw in raw_objects:\n',
          )

          replace_once(
              '''        accepted, duplicate_count = self._classify_duplicates_and_support(
              parsed,
              import_batch_id=import_batch_id,
              quarantined=quarantined,
              losses=losses,
              mapping_counts=mapping_counts,
              material_object_indexes=material_object_indexes,
          )
          self._quarantine_cycles_and_missing_dependencies(
              accepted,
              import_batch_id=import_batch_id,
              quarantined=quarantined,
              losses=losses,
              mapping_counts=mapping_counts,
              material_object_indexes=material_object_indexes,
          )
          ''',
              '''        accepted, duplicate_count = self._classify_duplicates_and_support(
              parsed,
              import_batch_id=import_batch_id,
              started_at=started_at,
              quarantined=quarantined,
              losses=losses,
              mapping_counts=mapping_counts,
              material_object_indexes=material_object_indexes,
              occurrence_indexes=occurrence_indexes,
          )
          self._quarantine_cycles_and_missing_dependencies(
              accepted,
              import_batch_id=import_batch_id,
              started_at=started_at,
              quarantined=quarantined,
              losses=losses,
              mapping_counts=mapping_counts,
              material_object_indexes=material_object_indexes,
              occurrence_indexes=occurrence_indexes,
          )
          ''',
          )

          replace_once(
              '''        staged_objects: list[StagedSourceObject] = []
          for candidate in accepted.values():
              mapping_status: StagedMappingStatus = "mapped_without_known_loss"
              transformed = False
              if (
                  candidate.parent_source_object_ids
                  and self.adapter.branch_behavior == "linearize_with_loss"
              ):
                  transformed = True
                  material_object_indexes.add(candidate.input_index)
                  losses.append(
                      _make_loss(
                          import_batch_id,
                          candidate.input_index,
                          category="branch-linearization",
                          source_object_id=candidate.source_object_id,
                          description=(
                              "The adapter declares branch linearization for this source object."
                          ),
                      )
                  )
              if (
                  candidate.source_type == "attachment"
                  and self.adapter.attachment_behavior == "metadata_only"
              ):
                  transformed = True
                  material_object_indexes.add(candidate.input_index)
                  losses.append(
                      _make_loss(
                          import_batch_id,
                          candidate.input_index,
                          category="attachment-metadata-only",
                          source_object_id=candidate.source_object_id,
                          description=(
                              "The adapter preserves attachment metadata without attachment bytes."
                          ),
                      )
                  )
              if transformed:
                  mapping_status = "mapped_with_transformation"
                  mapping_counts["mapped_with_transformation"] += 1
              else:
                  mapping_counts["mapped_without_known_loss"] += 1
              staged_objects.append(
                  StagedSourceObject(
                      source_object_id=candidate.source_object_id,
                      source_type=candidate.source_type,
                      parent_source_object_ids=candidate.parent_source_object_ids,
                      source_hash=candidate.source_hash,
                      payload_json=candidate.payload_json,
                      mapping_status=mapping_status,
                  )
              )
          ''',
              '''        staged_objects: list[StagedSourceObject] = []
          for candidate in accepted.values():
              indexes = occurrence_indexes[candidate.source_object_id]
              occurrence_count = len(indexes)
              mapping_status: StagedMappingStatus = "mapped_without_known_loss"
              transformed = False
              if (
                  candidate.parent_source_object_ids
                  and self.adapter.branch_behavior == "linearize_with_loss"
              ):
                  transformed = True
                  material_object_indexes.update(indexes)
                  for input_index in indexes:
                      losses.append(
                          _make_loss(
                              import_batch_id,
                              input_index,
                              recorded_at=started_at,
                              category="branch-linearization",
                              source_object_id=candidate.source_object_id,
                              description=(
                                  "The adapter declares branch linearization for this source object."
                              ),
                          )
                      )
              if (
                  candidate.source_type == "attachment"
                  and self.adapter.attachment_behavior == "metadata_only"
              ):
                  transformed = True
                  material_object_indexes.update(indexes)
                  for input_index in indexes:
                      losses.append(
                          _make_loss(
                              import_batch_id,
                              input_index,
                              recorded_at=started_at,
                              category="attachment-metadata-only",
                              source_object_id=candidate.source_object_id,
                              description=(
                                  "The adapter preserves attachment metadata without attachment bytes."
                              ),
                          )
                      )
              if transformed:
                  mapping_status = "mapped_with_transformation"
                  mapping_counts["mapped_with_transformation"] += occurrence_count
              else:
                  mapping_counts["mapped_without_known_loss"] += occurrence_count
              staged_objects.append(
                  StagedSourceObject(
                      source_object_id=candidate.source_object_id,
                      source_type=candidate.source_type,
                      parent_source_object_ids=candidate.parent_source_object_ids,
                      source_hash=candidate.source_hash,
                      payload_json=candidate.payload_json,
                      mapping_status=mapping_status,
                  )
              )
          ''',
          )

          replace_once(
              '            staged_object_count=len(staged_objects),\n',
              '            staged_object_count=len(raw_objects),\n',
          )

          replace_once(
              '''        import_batch_id: str,
              quarantined: list[QuarantinedSourceObject],
              losses: list[PortabilityLossRecord],
              mapping_counts: dict[str, int],
              material_object_indexes: set[int],
          ) -> dict[str, _Candidate]:
          ''',
              '''        import_batch_id: str,
              started_at: str,
              quarantined: list[QuarantinedSourceObject],
              losses: list[PortabilityLossRecord],
              mapping_counts: dict[str, int],
              material_object_indexes: set[int],
              occurrence_indexes: dict[str, tuple[int, ...]],
          ) -> dict[str, _Candidate]:
          ''',
          )

          replace_once(
              '''            representative = min(group, key=lambda item: item.input_index)
              if not self._source_type_supported(representative):
          ''',
              '''            representative = min(group, key=lambda item: item.input_index)
              if (
                  representative.source_type == "attachment"
                  and len(representative.payload_json.encode("utf-8"))
                  > self.adapter.resource_limits.max_attachment_bytes
              ):
                  for item in group:
                      quarantined.append(
                          QuarantinedSourceObject(
                              input_index=item.input_index,
                              source_object_id=item.source_object_id,
                              source_hash=item.source_hash,
                              reason="attachment-byte-limit",
                          )
                      )
                      mapping_counts["malformed_or_quarantined"] += 1
                      material_object_indexes.add(item.input_index)
                      losses.append(
                          _make_loss(
                              import_batch_id,
                              item.input_index,
                              recorded_at=started_at,
                              category="attachment-byte-limit",
                              source_object_id=item.source_object_id,
                              description="The attachment payload exceeds the declared byte limit.",
                          )
                      )
                  continue
              if not self._source_type_supported(representative):
          ''',
          )

          replace_once(
              '''            accepted[source_object_id] = representative
              duplicate_count += len(group) - 1
              mapping_counts["mapped_without_known_loss"] += len(group) - 1
          return accepted, duplicate_count
          ''',
              '''            accepted[source_object_id] = representative
              occurrence_indexes[source_object_id] = tuple(
                  sorted(item.input_index for item in group)
              )
              duplicate_count += len(group) - 1
          return accepted, duplicate_count
          ''',
          )

          replace_once(
              '''        import_batch_id: str,
              quarantined: list[QuarantinedSourceObject],
              losses: list[PortabilityLossRecord],
              mapping_counts: dict[str, int],
              material_object_indexes: set[int],
          ) -> None:
              cycle_ids = _cycle_source_ids(accepted)
          ''',
              '''        import_batch_id: str,
              started_at: str,
              quarantined: list[QuarantinedSourceObject],
              losses: list[PortabilityLossRecord],
              mapping_counts: dict[str, int],
              material_object_indexes: set[int],
              occurrence_indexes: dict[str, tuple[int, ...]],
          ) -> None:
              cycle_ids = _cycle_source_ids(accepted)
          ''',
          )

          replace_once(
              '''        for source_object_id in sorted(cycle_ids):
              candidate = accepted.pop(source_object_id)
              quarantined.append(
                  QuarantinedSourceObject(
                      input_index=candidate.input_index,
                      source_object_id=candidate.source_object_id,
                      source_hash=candidate.source_hash,
                      reason="cyclic-parent-relationship",
                  )
              )
              mapping_counts["malformed_or_quarantined"] += 1
              material_object_indexes.add(candidate.input_index)
              losses.append(
                  _make_loss(
                      import_batch_id,
                      candidate.input_index,
                      category="cyclic-parent-relationship",
                      source_object_id=candidate.source_object_id,
                      description="The source parent graph contains a cycle.",
                  )
              )
          ''',
              '''        for source_object_id in sorted(cycle_ids):
              candidate = accepted.pop(source_object_id)
              indexes = occurrence_indexes.pop(source_object_id)
              for input_index in indexes:
                  quarantined.append(
                      QuarantinedSourceObject(
                          input_index=input_index,
                          source_object_id=candidate.source_object_id,
                          source_hash=candidate.source_hash,
                          reason="cyclic-parent-relationship",
                      )
                  )
                  mapping_counts["malformed_or_quarantined"] += 1
                  material_object_indexes.add(input_index)
                  losses.append(
                      _make_loss(
                          import_batch_id,
                          input_index,
                          recorded_at=started_at,
                          category="cyclic-parent-relationship",
                          source_object_id=candidate.source_object_id,
                          description="The source parent graph contains a cycle.",
                      )
                  )
          ''',
          )

          replace_once(
              '''            for candidate in sorted(missing, key=lambda item: item.source_object_id):
                  accepted.pop(candidate.source_object_id)
                  quarantined.append(
                      QuarantinedSourceObject(
                          input_index=candidate.input_index,
                          source_object_id=candidate.source_object_id,
                          source_hash=candidate.source_hash,
                          reason="missing-parent-dependency",
                      )
                  )
                  mapping_counts["missing_dependency"] += 1
                  material_object_indexes.add(candidate.input_index)
                  losses.append(
                      _make_loss(
                          import_batch_id,
                          candidate.input_index,
                          category="missing-parent-dependency",
                          source_object_id=candidate.source_object_id,
                          description="A declared parent source object is unavailable.",
                      )
                  )
                  changed = True
          ''',
              '''            for candidate in sorted(missing, key=lambda item: item.source_object_id):
                  accepted.pop(candidate.source_object_id)
                  indexes = occurrence_indexes.pop(candidate.source_object_id)
                  for input_index in indexes:
                      quarantined.append(
                          QuarantinedSourceObject(
                              input_index=input_index,
                              source_object_id=candidate.source_object_id,
                              source_hash=candidate.source_hash,
                              reason="missing-parent-dependency",
                          )
                      )
                      mapping_counts["missing_dependency"] += 1
                      material_object_indexes.add(input_index)
                      losses.append(
                          _make_loss(
                              import_batch_id,
                              input_index,
                              recorded_at=started_at,
                              category="missing-parent-dependency",
                              source_object_id=candidate.source_object_id,
                              description="A declared parent source object is unavailable.",
                          )
                      )
                  changed = True
          ''',
          )

          pattern = re.compile(
              r'(_make_loss\(\n(?P<indent>\s+)import_batch_id,\n(?P=indent)(?:raw|item|candidate)\.input_index,\n)(?!\s*recorded_at=)'
          )
          text, count = pattern.subn(
              lambda match: match.group(1)
              + match.group('indent')
              + 'recorded_at=started_at,\n',
              text,
          )
          if count < 4:
              raise SystemExit(f'expected remaining loss call replacements, found {count}')

          replace_once(
              '''def _make_loss(
              import_batch_id: str,
              input_index: int,
              *,
              category: str,
          ''',
              '''def _make_loss(
              import_batch_id: str,
              input_index: int,
              *,
              recorded_at: str,
              category: str,
          ''',
          )
          replace_once(
              '        recorded_at="1970-01-01T00:00:00Z",\n',
              '        recorded_at=recorded_at,\n',
          )

          path.write_text(text)

          test_path = Path('tests/test_generic_import_failures.py')
          test_text = test_path.read_text()
          test_text = test_text.replace(
              'assert result.import_batch.staged_object_count == 0',
              'assert result.import_batch.staged_object_count == 3',
          )
          test_text = test_text.replace(
              'match="manifest line is missing"',
              'match="must not be empty"',
          )
          test_path.write_text(test_text)
          PY
      - run: uv run ruff format src/doll/generic_import.py tests/test_generic_import.py tests/test_generic_import_failures.py
      - run: uv run pytest tests/test_generic_import.py tests/test_generic_import_failures.py --no-cov
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Fix IMP-034 staging invariants
          file_pattern: src/doll/generic_import.py tests/test_generic_import.py tests/test_generic_import_failures.py
