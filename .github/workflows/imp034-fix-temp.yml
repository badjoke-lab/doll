name: IMP-034 source snapshot

on:
  pull_request:

permissions:
  contents: read

jobs:
  snapshot:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'imp-034-generic-import-staging'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: imp-034-generic-import-staging
      - uses: actions/upload-artifact@v4
        with:
          name: imp034-current-files
          path: |
            src/doll/generic_import.py
            tests/test_generic_import.py
            tests/test_generic_import_failures.py
