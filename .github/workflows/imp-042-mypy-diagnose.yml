name: Diagnose IMP-042 mypy

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/imp-042-mypy-diagnose.yml"

permissions:
  contents: write

jobs:
  diagnose:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: imp-042-procedure-record
      - uses: astral-sh/setup-uv@v6
      - run: uv sync --dev --locked
      - name: Build implementation
        run: |
          python scripts/imp_042_update_core.py
          python scripts/imp_042_update_package.py
          python scripts/imp_042_update_status.py
          python scripts/build_final_spec.py
          uv run ruff check . --fix --ignore E501
          uv run ruff format .
      - name: Capture mypy output
        run: |
          set +e
          uv run mypy src tests > docs/implementation/imp-042-mypy-diagnostic.txt 2>&1
          echo "exit_code=$?" >> docs/implementation/imp-042-mypy-diagnostic.txt
          exit 0
      - name: Publish diagnostic
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/implementation/imp-042-mypy-diagnostic.txt
          git commit -m "TEMP: record IMP-042 mypy diagnostic"
          git push origin HEAD:imp-042-procedure-record
