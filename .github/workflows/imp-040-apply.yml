name: Finalize IMP-040 implementation

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/imp-040-apply.yml"

permissions:
  contents: write

jobs:
  finalize:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: imp-040-project-record-v2
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v6
      - run: uv sync --dev --locked
      - name: Verify applied implementation
        run: |
          uv run ruff check .
          uv run ruff format --check .
          uv run mypy src tests
          uv run python scripts/build_final_spec.py --check
          node scripts/check-public-site-status.mjs
          uv run pytest -q --no-cov tests/test_project_state.py tests/test_project_record_v2.py tests/test_state_package.py tests/test_state_package_v2.py tests/test_state_package_registry.py tests/test_state_package_registry_compatibility.py
          git diff --check
      - name: Remove finalizer
        run: |
          rm .github/workflows/imp-040-apply.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Finalize IMP-040 implementation"
          git push origin HEAD:imp-040-project-record-v2
