name: Apply IMP-040 implementation

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/imp-040-apply.yml"

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: imp-040-project-record-v2
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v6
      - run: uv sync --dev --locked
      - name: Apply ProjectRecord v2 implementation
        run: |
          python scripts/imp_040_prepare_source.py prepare
          python scripts/imp_040_update_project_state.py
          python scripts/imp_040_prepare_source.py cleanup
          python scripts/imp_040_update_package_status.py
          python scripts/build_final_spec.py
      - name: Ruff
        run: |
          uv run ruff check . --fix --ignore E501
          uv run ruff format .
          uv run ruff check . --ignore E501
      - name: Strict typing
        run: uv run mypy src tests
      - name: Specification and public status
        run: |
          uv run python scripts/build_final_spec.py --check
          node scripts/check-public-site-status.mjs
      - name: Project and package tests
        run: uv run pytest -q --no-cov tests/test_project_state.py tests/test_project_record_v2.py tests/test_state_package.py tests/test_state_package_v2.py tests/test_state_package_registry.py tests/test_state_package_registry_compatibility.py
      - name: Diff integrity
        run: git diff --check
      - name: Commit implementation
        run: |
          rm -f scripts/imp_040_prepare_source.py
          rm -f scripts/imp_040_update_project_state.py
          rm -f scripts/imp_040_update_package_status.py
          rm -f docs/implementation/imp-040-ruff-diagnostic.txt
          rm -f docs/implementation/imp-040-pytest-diagnostic.txt
          rm -f .github/workflows/imp-040-ruff-diagnose.yml
          rm -f .github/workflows/imp-040-pytest-diagnose.yml
          rm -f .github/workflows/imp-040-apply.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "IMP-040: add ProjectRecord v2"
          git push origin HEAD:imp-040-project-record-v2
