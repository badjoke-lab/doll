name: IMP-017 annotation fix

on:
  pull_request:

permissions:
  contents: write

jobs:
  fix:
    if: github.head_ref == 'imp-017-credential-broker'
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Add strict return annotations
        run: sed -i 's/    def clock():/    def clock() -> float:/g' tests/test_credential_broker.py

      - name: Commit annotation fix
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tests/test_credential_broker.py
          if ! git diff --cached --quiet; then
            git commit -m "IMP-017: Add strict clock annotations"
            git push origin HEAD:${{ github.head_ref }}
          fi
