name: IMP-055 format

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  format:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: imp-055-ollama-session-source-adapter
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: astral-sh/setup-uv@v6
      - run: uv sync --locked
      - run: uv run ruff check --fix src/doll/ollama_session_import.py tests/test_ollama_session_import.py
      - run: uv run ruff format src/doll/ollama_session_import.py tests/test_ollama_session_import.py
      - run: uv run ruff check src/doll/ollama_session_import.py tests/test_ollama_session_import.py
      - name: Commit formatting
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/doll/ollama_session_import.py tests/test_ollama_session_import.py
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "Format IMP-055 source adapter"
          git push origin HEAD:imp-055-ollama-session-source-adapter
