name: Clean IMP-054 implementation branch

on:
  push:
    branches:
      - imp-054-real-runtime-continuity-drill

permissions:
  contents: write

concurrency:
  group: imp-054-cleanup
  cancel-in-progress: false

jobs:
  clean:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: imp-054-real-runtime-continuity-drill
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v6
      - name: Synchronize and remove temporary files
        run: |
          sleep 20
          git fetch origin imp-054-real-runtime-continuity-drill main
          git reset --hard origin/imp-054-real-runtime-continuity-drill
          git checkout origin/main -- .github/workflows/ci.yml
          rm -f .github/workflows/imp-054-conversation-package-fix.yml
          rm -f .github/workflows/imp-054-force-package-fix.yml
          rm -f .github/workflows/imp-054-cleanup.yml
          rm -f scripts/apply_imp054_package_support.py
      - run: uv sync --dev --locked
      - name: Validate implementation
        env:
          PYTHONPATH: src:.
        run: |
          uv run ruff format src/doll/state_package.py src/doll/state_package_registry.py tests/test_state_package_registry.py tests/test_state_package_v2.py tests/test_state_package_conversation.py
          uv run ruff check .
          uv run ruff format --check .
          uv run mypy src tests
          uv run python scripts/build_final_spec.py --check
          node scripts/check-public-site-status.mjs
          uv run pytest -q \
            tests/test_state_package_registry.py \
            tests/test_state_package_v2.py \
            tests/test_state_package_conversation.py \
            tests/test_runtime_continuity_acceptance.py \
            tests/test_runtime_continuity_acceptance_static.py
      - name: Commit cleaned implementation
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git diff --cached --check
          git commit -m "IMP-054: finalize canonical conversation package support"
          git push origin HEAD:imp-054-real-runtime-continuity-drill
