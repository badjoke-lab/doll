name: Implementation numbering

on:
  pull_request:
    types: [opened, reopened, edited, synchronize, ready_for_review]
  issues:
    types: [opened, reopened, edited]

permissions:
  contents: read
  issues: read
  pull-requests: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate implementation identifier
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/check-implementation-numbering-event.mjs
