name: Apply IMP-042 implementation

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/imp-042-apply.yml"

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: imp-042-procedure-record
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v6
      - run: uv sync --dev --locked
      - name: Apply implementation
        run: |
          python scripts/imp_042_update_core.py
          python scripts/imp_042_update_package.py
          python scripts/imp_042_update_status.py
          python scripts/imp_042_fix_typing.py
          python scripts/build_final_spec.py
      - name: Ruff
        run: |
          uv run ruff check . --fix --ignore E501
          uv run ruff format .
          uv run ruff check . --ignore E501
      - name: Strict typing
        run: uv run mypy src tests
      - name: Specification and status
        run: |
          uv run python scripts/build_final_spec.py --check
          node scripts/check-public-site-status.mjs
      - name: Focused tests
        run: uv run pytest -q --no-cov tests/test_procedure.py tests/test_state_package_registry.py tests/test_state_package_v2.py tests/test_work_item.py
      - name: Diff integrity
        run: git diff --check
      - name: Commit implementation
        run: |
          rm -f scripts/imp_042_update_core.py
          rm -f scripts/imp_042_update_package.py
          rm -f scripts/imp_042_update_status.py
          rm -f scripts/imp_042_fix_typing.py
          rm -f docs/implementation/imp-042-mypy-diagnostic.txt
          rm -f .github/workflows/imp-042-mypy-diagnose.yml
          rm -f .github/workflows/imp-042-apply.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "IMP-042: add ProcedureRecord v1"
          git push origin HEAD:imp-042-procedure-record
