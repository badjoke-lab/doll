name: Apply IMP-020 roadmap update

on:
  pull_request:

permissions:
  contents: write

jobs:
  update:
    if: github.head_ref == 'imp-020-prompt-injection-defense'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python .github/imp020_update_roadmap.py
      - run: python scripts/build_final_spec.py
      - run: python scripts/build_final_spec.py --check
      - run: rm -f .github/imp020_update_roadmap.py .github/workflows/imp020-roadmap.yml
      - run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m 'IMP-020: update roadmap and generated specification'
          git push origin HEAD:${{ github.head_ref }}
