name: Verify IMP-020 code and tests

on:
  pull_request:

permissions:
  contents: write

jobs:
  verify:
    if: github.head_ref == 'imp-020-prompt-injection-defense'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: astral-sh/setup-uv@v6
      - run: uv sync --locked
      - name: Remove obsolete typing suppression
        shell: python
        run: |
          from pathlib import Path
          path = Path('tests/test_prompt_injection.py')
          text = path.read_text(encoding='utf-8')
          old = 'return InstructionContextBundle(**values)  # type: ignore[arg-type]'
          new = 'return InstructionContextBundle(**values)'
          if old in text:
              text = text.replace(old, new, 1)
          elif new not in text:
              raise RuntimeError('expected synthetic bundle return was not found')
          path.write_text(text, encoding='utf-8', newline='\n')
      - run: uv run ruff format src/doll/prompt_injection.py tests/test_prompt_injection.py
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run mypy src tests
      - run: uv run pytest -q --tb=short
      - run: rm -f .github/imp020-mypy.txt .github/imp020-pytest.txt .github/workflows/imp020-roadmap.yml
      - run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m 'IMP-020: finalize verified code and tests'
          git push origin HEAD:${{ github.head_ref }}
