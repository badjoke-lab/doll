name: Format IMP-043 coverage tests

on:
  pull_request:
    branches: [main]
    paths: [.github/workflows/imp-043-coverage-format.yml]

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: imp-043-project-checkpoint
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v6
      - run: uv sync --dev --locked
      - name: Fix fixtures
        run: python scripts/imp_043_fix_coverage_tests.py
      - name: Ruff
        run: |
          uv run ruff check . --fix
          uv run ruff format .
          uv run ruff check .
      - name: Strict typing
        run: uv run mypy src tests
      - name: Focused tests
        run: uv run pytest -q --no-cov tests/test_checkpoint.py tests/test_checkpoint_coverage.py
      - name: Commit coverage tests
        run: |
          rm -f scripts/imp_043_fix_coverage_tests.py
          rm -f .github/workflows/imp-043-coverage-format.yml
          rm -f .github/workflows/imp-043-coverage-diagnose.yml
          rm -f .github/workflows/imp-043-pytest-diagnose.yml
          rm -f docs/implementation/imp-043-coverage-diagnostic.txt
          rm -f docs/implementation/imp-043-pytest-diagnostic.txt
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Strengthen IMP-043 defensive coverage"
          git push origin HEAD:imp-043-project-checkpoint
