name: Fix IMP-020 fixtures and diagnose typing

on:
  pull_request:

permissions:
  contents: write

jobs:
  diagnose:
    if: github.head_ref == 'imp-020-prompt-injection-defense'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: astral-sh/setup-uv@v6
      - run: uv sync --locked
      - name: Fix confirmed fixture mismatches
        shell: python
        run: |
          from pathlib import Path

          path = Path('tests/test_prompt_injection.py')
          text = path.read_text(encoding='utf-8')
          replacements = {
              'with pytest.raises(PromptContextLimitError, match="finding limit")': 'with pytest.raises(PromptContextLimitError, match="completely scanned")',
              'parent_operation_id="model-operation",\n                model_manifest_id="model-1",': 'parent_operation_id="model-operation",\n                session_id="session-1",\n                model_manifest_id="model-1",',
          }
          for old, new in replacements.items():
              count = text.count(old)
              if count != 1:
                  raise RuntimeError(f'fixture replacement count is {count}, expected 1')
              text = text.replace(old, new)
          path.write_text(text, encoding='utf-8', newline='\n')
      - run: uv run ruff format tests/test_prompt_injection.py
      - run: uv run ruff check src/doll/prompt_injection.py tests/test_prompt_injection.py
      - run: uv run mypy src tests > .github/imp020-mypy.txt 2>&1 || true
      - run: uv run pytest -q tests/test_prompt_injection.py --tb=short > .github/imp020-pytest.txt 2>&1 || true
      - run: rm -f .github/workflows/imp020-fix-tests-diagnose.yml
      - run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m 'TEMP: fix IMP-020 fixtures and record diagnostics'
          git push origin HEAD:${{ github.head_ref }}
