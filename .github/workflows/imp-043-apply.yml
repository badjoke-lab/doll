name: Apply IMP-043 implementation

on:
  pull_request:
    branches: [main]
    paths: [.github/workflows/imp-043-apply.yml]

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: imp-043-project-checkpoint
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v6
      - run: uv sync --dev --locked
      - run: python scripts/imp_043_apply.py
      - run: |
          uv run ruff check . --fix --ignore E501
          uv run ruff format .
          uv run ruff check . --ignore E501
          uv run mypy src tests
          uv run python scripts/build_final_spec.py --check
          node scripts/check-public-site-status.mjs
          uv run pytest -q --no-cov tests/test_checkpoint.py tests/test_state_package_registry.py tests/test_state_package_v2.py tests/test_work_item.py tests/test_procedure.py
          git diff --check
      - run: |
          rm scripts/imp_043_apply.py
          rm scripts/imp_043_update_registry.py
          rm scripts/imp_043_update_fixtures.py
          rm scripts/imp_043_update_checkpoint_tests.py
          rm scripts/imp_043_update_package_core.py
          rm scripts/imp_043_update_package_graph.py
          rm scripts/imp_043_update_status.py
          rm .github/workflows/imp-043-apply.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "IMP-043: add ProjectCheckpointRecord v1"
          git push origin HEAD:imp-043-project-checkpoint
