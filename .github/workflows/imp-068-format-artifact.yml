name: IMP-068 format artifact

on:
  pull_request:
    paths:
      - src/doll/local_writing.py
      - tests/test_imp_068_local_translation.py
      - .github/workflows/imp-068-format-artifact.yml

permissions:
  contents: write

jobs:
  format:
    if: github.event.pull_request.number == 220
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v6
      - run: uv sync --frozen
      - run: >-
          uv run ruff format
          src/doll/local_writing.py
          tests/test_imp_068_local_translation.py
      - name: Commit formatted files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/doll/local_writing.py tests/test_imp_068_local_translation.py
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "Format IMP-068 translation implementation"
          git push origin HEAD:${GITHUB_HEAD_REF}
