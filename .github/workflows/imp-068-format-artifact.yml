name: IMP-068 format artifact

on:
  pull_request:
    paths:
      - src/doll/local_writing.py
      - tests/test_imp_068_local_translation.py
      - .github/workflows/imp-068-format-artifact.yml

permissions:
  contents: read

jobs:
  format:
    if: github.event.pull_request.number == 220
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v6
      - run: uv sync --frozen
      - run: >-
          uv run ruff format
          src/doll/local_writing.py
          tests/test_imp_068_local_translation.py
      - uses: actions/upload-artifact@v4
        with:
          name: imp-068-formatted
          path: |
            src/doll/local_writing.py
            tests/test_imp_068_local_translation.py
          if-no-files-found: error
