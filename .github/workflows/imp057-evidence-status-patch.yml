name: IMP-057 apply evidence status boundary

on:
  push:
    branches:
      - imp-057-local-portability-drill
    paths:
      - "scripts/apply_imp_057_evidence_status_patch.py"
      - ".github/workflows/imp057-evidence-status-patch.yml"

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: imp-057-local-portability-drill
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v6
      - run: uv sync --locked --all-extras
      - name: Apply evidence status patch
        run: uv run python scripts/apply_imp_057_evidence_status_patch.py
      - name: Verify evidence status boundary
        run: |
          uv run ruff check --fix scripts/run_imp_057_local_portability.py
          uv run ruff format scripts/run_imp_057_local_portability.py
          uv run mypy src tests
          uv run pytest -q --no-cov tests/test_local_portability_acceptance.py tests/test_ollama_adapter_static.py
          uv run python scripts/run_imp_057_local_portability.py --commit-sha "$(git rev-parse HEAD)"
      - name: Commit evidence status patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/run_imp_057_local_portability.py
          git commit -m "Separate CI evidence from real-machine satisfaction"
          git push origin HEAD:imp-057-local-portability-drill
