name: IMP-034 type annotation fix

on:
  pull_request:

permissions:
  contents: write

jobs:
  fix:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'imp-034-generic-import-staging'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: imp-034-generic-import-staging
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: astral-sh/setup-uv@v6
      - run: uv sync --dev --locked
      - name: Apply type annotation fixes
        run: |
          python - <<'PY'
          from pathlib import Path

          source = Path('src/doll/generic_import.py')
          text = source.read_text()
          old = '''        occurrence_indexes: dict[str, tuple[int, ...]],
              ) -> dict[str, _Candidate]:
          '''
          new = '''        occurrence_indexes: dict[str, tuple[int, ...]],
              ) -> tuple[dict[str, _Candidate], int]:
          '''
          if old not in text:
              raise SystemExit('classify return annotation target not found')
          source.write_text(text.replace(old, new, 1))

          tests = Path('tests/test_generic_import.py')
          text = tests.read_text()
          text = text.replace(
              'import json\nfrom uuid import uuid4\n',
              'import json\nfrom collections.abc import Sequence\nfrom uuid import uuid4\n',
              1,
          )
          text = text.replace(
              '    objects: list[object],\n',
              '    objects: Sequence[object],\n',
              1,
          )
          tests.write_text(text)

          failures = Path('tests/test_generic_import_failures.py')
          text = failures.read_text()
          text = text.replace(
              'from doll.generic_import import GenericImportStager, GenericImportStagingError\n',
              'from doll.generic_import import (\n'
              '    GenericImportStageResult,\n'
              '    GenericImportStager,\n'
              '    GenericImportStagingError,\n'
              ')\n',
              1,
          )
          text = text.replace(
              '    source_format: str = "json",\n):\n',
              '    source_format: str = "json",\n) -> GenericImportStageResult:\n',
              1,
          )
          failures.write_text(text)
          PY
      - run: uv run ruff format src/doll/generic_import.py tests/test_generic_import.py tests/test_generic_import_failures.py
      - run: uv run ruff check src/doll/generic_import.py tests/test_generic_import.py tests/test_generic_import_failures.py
      - run: uv run mypy src tests
      - run: uv run pytest tests/test_generic_import.py tests/test_generic_import_failures.py --no-cov
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Fix IMP-034 type annotations
          file_pattern: src/doll/generic_import.py tests/test_generic_import.py tests/test_generic_import_failures.py
