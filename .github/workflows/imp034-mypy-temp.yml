name: IMP-034 mypy diagnostics

on:
  pull_request:

permissions:
  contents: read

jobs:
  mypy:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'imp-034-generic-import-staging'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: astral-sh/setup-uv@v6
      - run: uv sync --dev --locked
      - run: uv run mypy src tests > mypy.txt 2>&1 || true
      - uses: actions/upload-artifact@v4
        with:
          name: imp034-mypy-output
          path: mypy.txt
