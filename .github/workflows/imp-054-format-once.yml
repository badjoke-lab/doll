name: Apply final IMP-054 formatting once

on:
  push:
    branches:
      - imp-054-real-runtime-continuity-drill

permissions:
  contents: write

concurrency:
  group: imp-054-format-once
  cancel-in-progress: false

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: imp-054-real-runtime-continuity-drill
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v6
      - run: uv sync --dev --locked
      - name: Apply repository formatter and remove this workflow
        run: |
          uv run ruff format .
          rm .github/workflows/imp-054-format-once.yml
      - name: Commit only when formatting changed
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git diff --cached --check
          git commit -m "IMP-054: apply final repository formatting"
          git push origin HEAD:imp-054-real-runtime-continuity-drill
