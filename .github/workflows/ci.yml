name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply-imp-039:
    if: github.event_name == 'pull_request' && github.head_ref == 'imp-039-state-package-record-registry'
    runs-on: ubuntu-latest
    steps:
      - name: Check out implementation branch
        uses: actions/checkout@v4
        with:
          ref: imp-039-state-package-record-registry
          fetch-depth: 0

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Install project
        run: uv sync --dev --locked

      - name: Apply implementation updates
        run: |
          python scripts/imp_039_update_registry_core.py
          python scripts/imp_039_update_registry_flow.py
          python scripts/imp_039_update_status.py
          python scripts/build_final_spec.py
          uv run ruff check . --fix
          uv run ruff format .
          uv run ruff check .
          uv run mypy src tests
          uv run python scripts/build_final_spec.py --check
          node scripts/check-public-site-status.mjs
          uv run python scripts/run_ci_tests.py
          git diff --check

      - name: Publish implementation
        run: |
          git show origin/main:.github/workflows/ci.yml > .github/workflows/ci.yml
          rm .github/workflows/imp-039-apply.yml
          rm scripts/imp_039_update_registry_core.py
          rm scripts/imp_039_update_registry_flow.py
          rm scripts/imp_039_update_status.py
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "IMP-039: add versioned package record registry"
          git push origin HEAD:imp-039-state-package-record-registry

  quality:
    if: github.event_name != 'pull_request' || github.head_ref != 'imp-039-state-package-record-registry'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Verify dependency lock
        run: uv lock --check

      - name: Install project
        run: uv sync --dev --locked

      - name: Lint
        run: uv run ruff check .

      - name: Check formatting
        run: uv run ruff format --check .

      - name: Type check
        run: uv run mypy src tests

      - name: Check generated specification
        run: uv run python scripts/build_final_spec.py --check

  test:
    if: github.event_name != 'pull_request' || github.head_ref != 'imp-039-state-package-record-registry'
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install project
        run: uv sync --dev --locked

      - name: Run tests
        run: uv run python scripts/run_ci_tests.py

      - name: Upload pytest output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-output-${{ runner.os }}
          path: pytest-output.txt
          if-no-files-found: error

      - name: Check CLI help
        run: uv run doll --help

      - name: Check module CLI help
        run: uv run python -m doll --help
