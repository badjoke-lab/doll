name: CI

on:
  pull_request:

permissions:
  contents: write

jobs:
  finalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out implementation branch
        uses: actions/checkout@v4
        with:
          ref: imp-051-canonical-local-conversation
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Apply archive read hardening
        run: python scripts/imp051_fix_zip_error.py

      - name: Restore permanent workflow and remove helper
        shell: bash
        run: |
          rm scripts/imp051_fix_zip_error.py
          git checkout origin/main -- .github/workflows/ci.yml

      - name: Validate hardening
        shell: bash
        run: |
          uv sync --dev --locked
          uv run ruff check src/doll/state_package.py tests/test_state_package_zip_error.py
          uv run ruff format --check src/doll/state_package.py tests/test_state_package_zip_error.py
          uv run mypy src/doll/state_package.py tests/test_state_package_zip_error.py
          uv run pytest -q --no-cov tests/test_state_package_zip_error.py tests/test_project_continuity_transfer.py::test_secret_workspace_backup_and_corrupt_package_leave_no_partial_target
          git diff --check

      - name: Commit hardening
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "fix: normalize state package archive read errors"
          git push origin HEAD:imp-051-canonical-local-conversation
