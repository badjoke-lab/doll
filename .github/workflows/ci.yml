name: CI

on:
  push:
    branches:
      - imp-050-model-manifests-bindings

permissions:
  contents: read

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - name: Check out implementation branch
        uses: actions/checkout@v4
        with:
          ref: imp-050-model-manifests-bindings
          fetch-depth: 0

      - name: Build source snapshot
        shell: bash
        run: |
          git archive --format=zip --output=imp050-source.zip HEAD

      - name: Upload source snapshot
        uses: actions/upload-artifact@v4
        with:
          name: imp050-source
          path: imp050-source.zip
          if-no-files-found: error
