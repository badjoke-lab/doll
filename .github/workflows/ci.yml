name: CI

on:
  pull_request:

permissions:
  contents: write

jobs:
  harden:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out implementation branch
        uses: actions/checkout@v4
        with:
          ref: imp-049-ollama-adapter
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Apply boundary hardening
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          module_path = Path("src/doll/ollama_adapter.py")
          module = module_path.read_text(encoding="utf-8")
          old = '''    if method not in {"GET", "POST"}:
              raise RuntimeContractError("unsupported Ollama HTTP method")
          if path not in {"/api/version", "/api/tags", "/api/generate"}:
              raise RuntimeContractError("unsupported Ollama API path")
          if method == "GET" and body is not None:
              raise RuntimeContractError("Ollama GET request cannot have a body")
          if method == "POST" and (not isinstance(body, bytes) or not body):
              raise RuntimeContractError("Ollama POST request requires a body")
          '''
          new = '''    expected_method = {
              "/api/version": "GET",
              "/api/tags": "GET",
              "/api/generate": "POST",
          }.get(path)
          if expected_method is None:
              raise RuntimeContractError("unsupported Ollama API path")
          if method != expected_method:
              raise RuntimeContractError("unsupported Ollama HTTP method for path")
          if expected_method == "GET" and body is not None:
              raise RuntimeContractError("Ollama GET request cannot have a body")
          if expected_method == "POST" and (not isinstance(body, bytes) or not body):
              raise RuntimeContractError("Ollama POST request requires a body")
          '''
          if old not in module:
              raise SystemExit("HTTP validation patch target missing")
          module = module.replace(old, new, 1)
          old = '''def _map_transport_failure(exc: OllamaTransportFailure) -> RuntimeFailureCode:
              if exc.code == "cancelled":
          '''
          new = '''def _map_transport_failure(exc: OllamaTransportFailure) -> RuntimeFailureCode:
              if exc.status_code == 404:
                  return "model_not_found"
              if exc.code == "cancelled":
          '''
          if old not in module:
              raise SystemExit("transport mapping patch target missing")
          module_path.write_text(module.replace(old, new, 1), encoding="utf-8")

          test_path = Path("tests/test_ollama_adapter.py")
          test = test_path.read_text(encoding="utf-8")
          old = '''        {"method": "DELETE"},
                  {"path": "/api/pull"},
                  {"method": "GET", "body": b"{}"},
                  {"method": "POST", "body": None},
          '''
          new = '''        {"method": "DELETE"},
                  {"path": "/api/pull"},
                  {"method": "POST", "path": "/api/version", "body": b"{}"},
                  {"method": "GET", "path": "/api/generate", "body": None},
                  {"method": "GET", "body": b"{}"},
                  {"method": "POST", "path": "/api/generate", "body": None},
          '''
          if old not in test:
              raise SystemExit("HTTP validation test target missing")
          test = test.replace(old, new, 1)
          start = test.index("def test_stream_detects_extra_data_and_maps_transport_failures() -> None:")
          end = test.index("\n\ndef test_stream_observes_cooperative_cancellation_between_lines", start)
          block = test[start:end]
          old = '''        (OllamaTransportFailure("invalid_response"), "invalid_response"),
                  (OllamaTransportFailure("failure"), "adapter_failure"),
          '''
          new = '''        (OllamaTransportFailure("invalid_response"), "invalid_response"),
                  (OllamaTransportFailure("failure", status_code=404), "model_not_found"),
                  (OllamaTransportFailure("failure"), "adapter_failure"),
          '''
          if old not in block:
              raise SystemExit("stream mapping test target missing")
          block = block.replace(old, new, 1)
          test_path.write_text(test[:start] + block + test[end:], encoding="utf-8")
          PY

      - name: Validate hardening
        shell: bash
        run: |
          uv sync --dev --locked
          uv run ruff format src/doll/ollama_adapter.py tests/test_ollama_adapter.py
          uv run ruff check src/doll/ollama_adapter.py tests/test_ollama_adapter.py tests/test_ollama_adapter_static.py
          uv run mypy src/doll/ollama_adapter.py tests/test_ollama_adapter.py tests/test_ollama_adapter_static.py
          uv run pytest -q --no-cov tests/test_ollama_adapter.py tests/test_ollama_adapter_static.py

      - name: Commit hardened implementation
        shell: bash
        run: |
          git checkout origin/main -- .github/workflows/ci.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "fix: enforce Ollama method and status boundaries"
          git push origin HEAD:imp-049-ollama-adapter
