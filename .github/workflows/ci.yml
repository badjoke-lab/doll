name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Verify dependency lock
        run: uv lock --check

      - name: Install project
        run: uv sync --dev --locked

      - name: Capture quality checks
        shell: bash
        run: |
          set +e
          uv run ruff check . > lint-output.txt 2>&1
          echo $? > lint-status.txt
          uv run ruff format --check . > format-output.txt 2>&1
          echo $? > format-status.txt
          uv run mypy src tests > mypy-output.txt 2>&1
          echo $? > mypy-status.txt
          uv run python scripts/build_final_spec.py --check > spec-output.txt 2>&1
          echo $? > spec-status.txt
          exit 0

      - name: Create formatted diagnostic copies
        run: |
          uv run ruff format src/doll/audit.py src/doll/safe_logging.py tests/test_safe_logging.py

      - name: Upload quality output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-output
          path: |
            lint-output.txt
            lint-status.txt
            format-output.txt
            format-status.txt
            mypy-output.txt
            mypy-status.txt
            spec-output.txt
            spec-status.txt
          if-no-files-found: error

      - name: Upload formatted files
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: formatted-files
          path: |
            src/doll/audit.py
            src/doll/safe_logging.py
            tests/test_safe_logging.py
          if-no-files-found: error

      - name: Enforce quality checks
        shell: bash
        run: |
          test "$(cat lint-status.txt)" = "0"
          test "$(cat format-status.txt)" = "0"
          test "$(cat mypy-status.txt)" = "0"
          test "$(cat spec-status.txt)" = "0"

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install project
        run: uv sync --dev --locked

      - name: Run tests
        run: uv run python scripts/run_ci_tests.py

      - name: Upload pytest output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-output-${{ runner.os }}
          path: pytest-output.txt
          if-no-files-found: error

      - name: Check CLI help
        run: uv run doll --help

      - name: Check module CLI help
        run: uv run python -m doll --help
