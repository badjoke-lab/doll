name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Verify dependency lock
        run: uv lock --check

      - name: Install project
        run: uv sync --dev --locked

      - name: Lint
        run: uv run ruff check .

      - name: Check formatting
        run: uv run ruff format --check .

      - name: Type check
        run: uv run mypy src tests

      - name: Check generated specification
        run: uv run python scripts/build_final_spec.py --check

      - name: Upload IMP-054 source snapshot
        if: github.event_name == 'pull_request' && github.head_ref == 'imp-054-real-runtime-continuity-drill'
        uses: actions/upload-artifact@v4
        with:
          name: imp-054-source-${{ github.event.pull_request.head.sha }}
          path: |
            .
            !.git/**
            !.venv/**
          include-hidden-files: true
          retention-days: 1

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install project
        run: uv sync --dev --locked

      - name: Run tests
        run: uv run python scripts/run_ci_tests.py

      - name: Upload pytest output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-output-${{ runner.os }}
          path: pytest-output.txt
          if-no-files-found: error

      - name: Check CLI help
        run: uv run doll --help

      - name: Check module CLI help
        run: uv run python -m doll --help
