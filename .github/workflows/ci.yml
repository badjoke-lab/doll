name: CI

on:
  push:
    branches:
      - imp-049-ollama-adapter

permissions:
  contents: write

jobs:
  materialize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out implementation branch
        uses: actions/checkout@v4
        with:
          ref: imp-049-ollama-adapter
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Decode staged implementation
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import base64
          import gzip
          import hashlib

          pairs = [
              (
                  Path('scripts/imp049_payload/ollama_adapter.gz.b64'),
                  Path('src/doll/ollama_adapter.py'),
                  '4ad107dbadcf89a3023e27c00f6c033dd204643c84140f4b55e2e98357d0a6bd',
              ),
              (
                  Path('scripts/imp049_payload/test_ollama_adapter.gz.b64'),
                  Path('tests/test_ollama_adapter.py'),
                  '474baeaf39dde1ea82b86b75f02866b57dd66616d74aad274be37d8c5b925eb4',
              ),
              (
                  Path('scripts/imp049_payload/test_ollama_adapter_static.gz.b64'),
                  Path('tests/test_ollama_adapter_static.py'),
                  '2e1844b6bcfd2029ae29245b38cb817459c05eb0ad60247a87b66dd6866a27fa',
              ),
          ]
          for source, destination, expected in pairs:
              compressed = base64.b64decode(source.read_text(encoding='ascii'), validate=True)
              content = gzip.decompress(compressed)
              actual = hashlib.sha256(content).hexdigest()
              if actual != expected:
                  raise SystemExit(f'payload checksum mismatch for {destination}: {actual}')
              destination.parent.mkdir(parents=True, exist_ok=True)
              destination.write_bytes(content)
          PY

      - name: Install project
        run: uv sync --dev --locked

      - name: Format implementation
        run: uv run ruff format src/doll/ollama_adapter.py tests/test_ollama_adapter.py tests/test_ollama_adapter_static.py

      - name: Lint implementation
        run: uv run ruff check src/doll/ollama_adapter.py tests/test_ollama_adapter.py tests/test_ollama_adapter_static.py

      - name: Type check implementation
        run: uv run mypy src/doll/ollama_adapter.py tests/test_ollama_adapter.py tests/test_ollama_adapter_static.py

      - name: Run focused tests
        run: uv run pytest -q --no-cov tests/test_ollama_adapter.py tests/test_ollama_adapter_static.py

      - name: Commit materialized implementation
        shell: bash
        run: |
          rm -rf scripts/imp049_payload
          git checkout origin/main -- .github/workflows/ci.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "IMP-049: add first local Ollama runtime adapter"
          git push origin HEAD:imp-049-ollama-adapter
