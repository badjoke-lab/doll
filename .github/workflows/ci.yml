name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Verify dependency lock
        run: uv lock --check

      - name: Install project
        run: uv sync --dev --locked

      - name: Apply IMP-016 quality fixes
        shell: bash
        run: |
          sed -i 's/  # type: ignore\[arg-type\]//' tests/test_secret_store_contract.py
          uv run ruff check --fix src/doll/secret_store.py
          uv run ruff format \
            src/doll/secret_store.py \
            src/doll/secret_store_contract.py \
            tests/test_secret_store.py \
            tests/test_secret_store_contract.py

      - name: Commit IMP-016 quality fixes
        shell: bash
        run: |
          if ! git diff --quiet -- \
            src/doll/secret_store.py \
            src/doll/secret_store_contract.py \
            tests/test_secret_store.py \
            tests/test_secret_store_contract.py; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add \
              src/doll/secret_store.py \
              src/doll/secret_store_contract.py \
              tests/test_secret_store.py \
              tests/test_secret_store_contract.py
            git commit -m "IMP-016: Apply quality fixes"
            git push origin HEAD:${{ github.head_ref || github.ref_name }}
          fi

      - name: Lint
        run: uv run ruff check .

      - name: Check formatting
        run: uv run ruff format --check .

      - name: Type check
        run: uv run mypy src tests

      - name: Check generated specification
        run: uv run python scripts/build_final_spec.py --check

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install project
        run: uv sync --dev --locked

      - name: Run tests
        run: uv run python scripts/run_ci_tests.py

      - name: Upload pytest output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-output-${{ runner.os }}
          path: pytest-output.txt
          if-no-files-found: error

      - name: Check CLI help
        run: uv run doll --help

      - name: Check module CLI help
        run: uv run python -m doll --help
