name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Check out implementation branch
        uses: actions/checkout@v4
        with:
          ref: imp-046-project-continuity-coverage
          fetch-depth: 0

      - name: Remove generated output
        run: git rm pytest-output.txt

      - name: Commit cleanup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git show origin/main:.github/workflows/ci.yml > .github/workflows/ci.yml
          git add -A
          git commit -m "chore: remove generated pytest output"
          git push origin HEAD:imp-046-project-continuity-coverage
