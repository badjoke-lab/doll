name: CI

on:
  pull_request:

permissions:
  contents: write

jobs:
  materialize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out implementation branch
        uses: actions/checkout@v4
        with:
          ref: imp-051-canonical-local-conversation
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Reconstruct implementation payload
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import hashlib
          import tarfile

          nibble_paths = [Path(f"scripts/imp051_nibbles/part.{index:02d}") for index in range(5)]
          encoded = "".join(path.read_text(encoding="ascii").strip() for path in nibble_paths)
          if len(encoded) % 2 or any(character < "A" or character > "P" for character in encoded):
              raise SystemExit("invalid nibble payload")
          prefix = bytes(
              ((ord(encoded[index]) - 65) << 4) | (ord(encoded[index + 1]) - 65)
              for index in range(0, len(encoded), 2)
          )

          decimal_prefix = bytes(
              int(value)
              for value in Path("scripts/imp051_decimal/part.00")
              .read_text(encoding="ascii")
              .split(",")
          )

          xor_tail = bytearray()
          for index in range(2):
              values = Path(f"scripts/imp051_xor_decimal/part.{index:02d}").read_text(
                  encoding="ascii"
              )
              xor_tail.extend(int(value) ^ 173 for value in values.split(","))

          shifted_tail = bytearray()
          for index in range(5):
              values = Path(f"scripts/imp051_plus_decimal/part.{index:02d}").read_text(
                  encoding="ascii"
              )
              shifted_tail.extend(int(value) - 3000 for value in values.split(","))

          payload = prefix + decimal_prefix + bytes(xor_tail) + bytes(shifted_tail)
          expected_hash = "67dc298c16bb762818aeb95cad32cda48f2572a288f2847d15266aebd55bce99"
          actual_hash = hashlib.sha256(payload).hexdigest()
          if actual_hash != expected_hash:
              raise SystemExit(f"payload checksum mismatch: {actual_hash}")

          archive = Path("/tmp/imp051-core.tar.gz")
          archive.write_bytes(payload)
          expected_names = {
              "src/doll/local_conversation.py",
              "src/doll/model_manifest.py",
              "tests/test_local_conversation.py",
              "tests/test_local_conversation_static.py",
          }
          with tarfile.open(archive, "r:gz") as bundle:
              members = bundle.getmembers()
              names = {member.name for member in members}
              if names != expected_names:
                  raise SystemExit(f"unexpected payload inventory: {sorted(names)}")
              for member in members:
                  destination = Path(member.name)
                  if not member.isfile() or destination.is_absolute() or ".." in destination.parts:
                      raise SystemExit(f"unsafe payload member: {member.name}")
                  source = bundle.extractfile(member)
                  if source is None:
                      raise SystemExit(f"unreadable payload member: {member.name}")
                  destination.parent.mkdir(parents=True, exist_ok=True)
                  destination.write_bytes(source.read())
          PY

      - name: Install project
        run: uv sync --dev --locked

      - name: Validate implementation
        shell: bash
        run: |
          uv run ruff check src/doll/local_conversation.py src/doll/model_manifest.py tests/test_local_conversation.py tests/test_local_conversation_static.py
          uv run ruff format --check src/doll/local_conversation.py src/doll/model_manifest.py tests/test_local_conversation.py tests/test_local_conversation_static.py
          uv run mypy src/doll/local_conversation.py src/doll/model_manifest.py tests/test_local_conversation.py tests/test_local_conversation_static.py
          uv run python -m pytest -q --no-cov tests/test_local_conversation.py tests/test_local_conversation_static.py

      - name: Commit materialized implementation
        shell: bash
        run: |
          rm -rf scripts/imp051_payload scripts/imp051_nibbles scripts/imp051_decimal scripts/imp051_xor_decimal scripts/imp051_plus_decimal
          git checkout origin/main -- .github/workflows/ci.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "IMP-051: add canonical local conversation execution"
          git push origin HEAD:imp-051-canonical-local-conversation
