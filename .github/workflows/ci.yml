name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Check out implementation branch
        uses: actions/checkout@v4
        with:
          ref: imp-045-resume-bundle
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install project
        run: uv sync --dev --locked

      - name: Format coverage tests
        run: uv run ruff format tests/test_resume_bundle_coverage.py

      - name: Commit locked formatting
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git show origin/main:.github/workflows/ci.yml > .github/workflows/ci.yml
          git add -A
          git commit -m "test: format Resume Bundle coverage cases"
          git push origin HEAD:imp-045-resume-bundle

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install project
        run: uv sync --dev --locked

      - name: Run tests
        run: uv run python scripts/run_ci_tests.py

      - name: Upload pytest output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-output-${{ runner.os }}
          path: pytest-output.txt
          if-no-files-found: error

      - name: Check CLI help
        run: uv run doll --help

      - name: Check module CLI help
        run: uv run python -m doll --help
