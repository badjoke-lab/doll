name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply-conversation-package:
    if: github.event_name == 'pull_request' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out implementation branch
        uses: actions/checkout@v4
        with:
          ref: imp-054-real-runtime-continuity-drill

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Install project
        run: uv sync --dev --locked

      - name: Register canonical conversations in package v2
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace_once(path: str, old: str, new: str) -> None:
              file = Path(path)
              text = file.read_text(encoding="utf-8")
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"{path}: expected one match, found {count}: {old[:120]!r}")
              file.write_text(text.replace(old, new), encoding="utf-8")

          registry = "src/doll/state_package_registry.py"
          replace_once(
              registry,
              '''    AuthoritativeRecordCategory(
        "model_binding",
        "records/model-bindings.jsonl",
        False,
        "model_binding",
    ),
)''',
              '''    AuthoritativeRecordCategory(
        "model_binding",
        "records/model-bindings.jsonl",
        False,
        "model_binding",
    ),
    AuthoritativeRecordCategory(
        "conversation",
        "records/conversations.jsonl",
        False,
        "conversation",
    ),
    AuthoritativeRecordCategory(
        "conversation_event",
        "records/conversation-events.jsonl",
        False,
        "conversation_event",
    ),
)''',
          )

          package = "src/doll/state_package.py"
          replace_once(
              package,
              '''    StateError,
    _utc_now,
''',
              '''    StateCorruptError,
    StateError,
    _utc_now,
''',
          )
          replace_once(
              package,
              "from doll.state_repository import StateRepository, _validate_record_fields\n",
              '''from doll.state_repository import (
    StateRepository,
    _conversation_event_from_envelope,
    _conversation_from_envelope,
    _validate_record_fields,
)
''',
          )
          replace_once(
              package,
              '''    "model_binding": _binding_from_record,
}''',
              '''    "model_binding": _binding_from_record,
    "conversation": _conversation_from_envelope,
    "conversation_event": _conversation_event_from_envelope,
}''',
          )
          replace_once(
              package,
              '''        SettingsCorruptError,
        TruthCorruptError,
''',
              '''        SettingsCorruptError,
        StateCorruptError,
        TruthCorruptError,
''',
          )
          replace_once(
              package,
              '''    _validate_work_item_package_graph(records)
    _validate_procedure_package_graph(records)
    _validate_checkpoint_package_graph(records)


def _validate_work_item_package_graph''',
              '''    _validate_conversation_package_graph(records)
    _validate_work_item_package_graph(records)
    _validate_procedure_package_graph(records)
    _validate_checkpoint_package_graph(records)


def _validate_conversation_package_graph(records: dict[str, RecordEnvelope]) -> None:
    conversations = {
        record.id: _conversation_from_envelope(record)
        for record in records.values()
        if record.record_type == "conversation"
    }
    events = {
        record.id: _conversation_event_from_envelope(record)
        for record in records.values()
        if record.record_type == "conversation_event"
    }
    graph: dict[str, tuple[str, ...]] = {}
    for event in events.values():
        if event.conversation_id not in conversations:
            raise StatePackageValidationError(
                "conversation event references a missing conversation"
            )
        for parent_id in event.parent_event_ids:
            parent = events.get(parent_id)
            if parent is None:
                raise StatePackageValidationError(
                    "conversation event references a missing parent"
                )
            if parent.conversation_id != event.conversation_id:
                raise StatePackageValidationError(
                    "conversation event parent crosses conversation scope"
                )
        graph[event.event_id] = event.parent_event_ids

    visiting: set[str] = set()
    visited: set[str] = set()

    def visit(event_id: str) -> None:
        if event_id in visiting:
            raise StatePackageValidationError("conversation event graph contains a cycle")
        if event_id in visited:
            return
        visiting.add(event_id)
        for parent_id in graph.get(event_id, ()):
            visit(parent_id)
        visiting.remove(event_id)
        visited.add(event_id)

    for event_id in graph:
        visit(event_id)


def _validate_work_item_package_graph''',
          )

          registry_tests = "tests/test_state_package_registry.py"
          replace_once(
              registry_tests,
              '''        "model_binding",
    }''',
              '''        "model_binding",
        "conversation",
        "conversation_event",
    }''',
          )
          replace_once(
              registry_tests,
              '''        "records/model-bindings.jsonl",
    }''',
              '''        "records/model-bindings.jsonl",
        "records/conversations.jsonl",
        "records/conversation-events.jsonl",
    }''',
          )

          v2_tests = "tests/test_state_package_v2.py"
          replace_once(
              v2_tests,
              '''        "records/model-bindings.jsonl",
    ):
''',
              '''        "records/model-bindings.jsonl",
        "records/conversations.jsonl",
        "records/conversation-events.jsonl",
    ):
''',
          )
          replace_once(
              v2_tests,
              '''        "model_binding",
    ):
''',
              '''        "model_binding",
        "conversation",
        "conversation_event",
    ):
''',
          )
          PY
          uv run ruff check --fix src/doll/state_package.py src/doll/state_package_registry.py tests/test_state_package_registry.py tests/test_state_package_v2.py tests/test_state_package_conversation.py
          uv run ruff format src/doll/state_package.py src/doll/state_package_registry.py tests/test_state_package_registry.py tests/test_state_package_v2.py tests/test_state_package_conversation.py

      - name: Run targeted package and runtime tests
        env:
          PYTHONPATH: src:.
        run: |
          uv run pytest \
            tests/test_state_package_registry.py \
            tests/test_state_package_v2.py \
            tests/test_state_package_conversation.py \
            tests/test_runtime_continuity_acceptance.py \
            tests/test_runtime_continuity_acceptance_static.py \
            -q

      - name: Commit formal package support
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/doll/state_package.py src/doll/state_package_registry.py tests/test_state_package_registry.py tests/test_state_package_v2.py tests/test_state_package_conversation.py
          git diff --cached --check
          git commit -m "IMP-054: add canonical conversation package support"
          git push origin HEAD:imp-054-real-runtime-continuity-drill

  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Verify dependency lock
        run: uv lock --check

      - name: Install project
        run: uv sync --dev --locked

      - name: Lint
        run: uv run ruff check .

      - name: Check formatting
        run: uv run ruff format --check .

      - name: Type check
        run: uv run mypy src tests

      - name: Check generated specification
        run: uv run python scripts/build_final_spec.py --check

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install project
        run: uv sync --dev --locked

      - name: Run tests
        run: uv run python scripts/run_ci_tests.py

      - name: Upload pytest output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-output-${{ runner.os }}
          path: pytest-output.txt
          if-no-files-found: error

      - name: Check CLI help
        run: uv run doll --help

      - name: Check module CLI help
        run: uv run python -m doll --help
