name: CI

on:
  pull_request:
  push:
    branches:
      - imp-047-phase4b-completion

permissions:
  contents: write

jobs:
  diagnose-tests:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out completion branch
        uses: actions/checkout@v4
        with:
          ref: imp-047-phase4b-completion
          fetch-depth: 1
          show-progress: false

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Apply completion records and capture tests
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path("scripts/imp047_complete_gate.py")
          text = path.read_text(encoding="utf-8")
          text = text.replace(
              '''        ''' + "'''    'data-roadmap-phase=\"4B\"',\n    \"data-roadmap-state\",'''",
              '''        ''' + "'''  'data-roadmap-phase=\"4B\"',\n  \"data-roadmap-state\",'''",
          )
          text = text.replace(
              '''        ''' + "'''    'data-roadmap-phase=\"4B\"',\n    'data-roadmap-phase=\"5\"',\n    \"data-roadmap-state\",'''",
              '''        ''' + "'''  'data-roadmap-phase=\"4B\"',\n  'data-roadmap-phase=\"5\"',\n  \"data-roadmap-state\",'''",
          )
          path.write_text(text, encoding="utf-8")
          PY
          python scripts/imp047_complete_gate.py
          uv sync --dev --locked
          set +e
          uv run pytest -q tests/test_project_continuity_acceptance.py tests/test_project_continuity_acceptance_static.py > imp047-pytest-diagnostic.txt 2>&1
          code=$?
          printf '\nexit_code=%s\n' "$code" >> imp047-pytest-diagnostic.txt
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add imp047-pytest-diagnostic.txt
          git commit -m "chore: capture Phase 4B focused test diagnostic"
          git push origin HEAD:imp-047-phase4b-completion
