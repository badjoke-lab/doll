name: CI

on:
  pull_request:

permissions:
  contents: read

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: imp-052-routing
          fetch-depth: 0
      - name: Build source snapshot
        run: git archive --format=zip --output=imp052-source.zip HEAD
      - name: Upload source snapshot
        uses: actions/upload-artifact@v4
        with:
          name: imp052-source
          path: imp052-source.zip
          if-no-files-found: error
