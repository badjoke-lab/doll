name: CI

on:
  pull_request:
  push:
    branches:
      - imp-047-phase4b-completion

permissions:
  contents: write

jobs:
  diagnose:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out completion branch
        uses: actions/checkout@v4
        with:
          ref: imp-047-phase4b-completion
          fetch-depth: 1
          show-progress: false

      - name: Capture finalizer result
        shell: bash
        run: |
          set +e
          python scripts/imp047_complete_gate.py > imp047-finalizer-diagnostic.txt 2>&1
          code=$?
          printf '\nexit_code=%s\n' "$code" >> imp047-finalizer-diagnostic.txt
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add imp047-finalizer-diagnostic.txt
          git commit -m "chore: capture Phase 4B finalizer diagnostic"
          git push origin HEAD:imp-047-phase4b-completion
