name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Check out implementation branch
        uses: actions/checkout@v4
        with:
          ref: imp-045-resume-bundle
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Apply IMP-045 finalization
        run: |
          python scripts/finalize_imp045.py
          rm .github/workflows/imp045-finalize.yml scripts/finalize_imp045.py

      - name: Verify dependency lock
        run: uv lock --check

      - name: Install project
        run: uv sync --dev --locked

      - name: Format finalized workspace
        run: uv run ruff format .

      - name: Lint
        run: uv run ruff check .

      - name: Check formatting
        run: uv run ruff format --check .

      - name: Type check
        run: uv run mypy src tests

      - name: Check generated specification
        run: uv run python scripts/build_final_spec.py --check

      - name: Check public project status
        run: node scripts/check-public-site-status.mjs

      - name: Commit verified finalization
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git show origin/main:.github/workflows/ci.yml > .github/workflows/ci.yml
          git add -A
          git commit -m "IMP-045: finalize Resume Bundle implementation"
          git push origin HEAD:imp-045-resume-bundle

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Apply IMP-045 finalization
        shell: bash
        run: |
          python scripts/finalize_imp045.py
          rm .github/workflows/imp045-finalize.yml scripts/finalize_imp045.py

      - name: Install project
        run: uv sync --dev --locked

      - name: Run tests
        run: uv run python scripts/run_ci_tests.py

      - name: Upload pytest output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-output-${{ runner.os }}
          path: pytest-output.txt
          if-no-files-found: error

      - name: Check CLI help
        run: uv run doll --help

      - name: Check module CLI help
        run: uv run python -m doll --help
