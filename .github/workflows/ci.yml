name: CI

on:
  pull_request:
  push:
    branches:
      - imp-047-phase4b-completion

permissions:
  contents: write

jobs:
  finalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out completion branch
        uses: actions/checkout@v4
        with:
          ref: imp-047-phase4b-completion
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Finalize Phase 4B completion
        shell: bash
        run: |
          python scripts/imp047_complete_gate.py
          uv sync --dev --locked
          uv run python scripts/build_final_spec.py
          rm -f .github/workflows/imp047-complete.yml
          rm -f scripts/imp047_complete_gate.py
          git checkout origin/main -- .github/workflows/ci.yml
          uv run ruff format tests/test_project_continuity_acceptance.py tests/test_project_continuity_acceptance_static.py
          uv run ruff check .
          uv run mypy src tests
          uv run python scripts/build_final_spec.py --check
          node scripts/check-public-site-status.mjs
          uv run pytest -q tests/test_project_continuity_acceptance.py tests/test_project_continuity_acceptance_static.py
          git diff --check

      - name: Commit finalized completion branch
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "docs: complete Phase 4B project-continuity gate"
          git push origin HEAD:imp-047-phase4b-completion
