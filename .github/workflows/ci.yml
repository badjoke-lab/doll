name: CI

on:
  pull_request:

permissions:
  contents: write

jobs:
  finalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out implementation branch
        uses: actions/checkout@v4
        with:
          ref: imp-049-ollama-adapter
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Apply IMP-049 project state
        run: python scripts/imp049_finalize.py

      - name: Install project
        run: uv sync --dev --locked

      - name: Generate combined specification
        run: uv run python scripts/build_final_spec.py

      - name: Restore permanent files
        shell: bash
        run: |
          rm scripts/imp049_finalize.py
          git checkout origin/main -- .github/workflows/ci.yml

      - name: Validate finalized branch
        shell: bash
        run: |
          uv run ruff check .
          uv run ruff format --check .
          uv run mypy src tests
          uv run python scripts/build_final_spec.py --check
          node scripts/check-public-site-status.mjs
          uv run pytest -q --no-cov tests/test_runtime_adapter.py tests/test_runtime_adapter_static.py tests/test_ollama_adapter.py tests/test_ollama_adapter_static.py
          git diff --check

      - name: Commit finalized implementation
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "docs: record IMP-049 Phase 5 adapter state"
          git push origin HEAD:imp-049-ollama-adapter
