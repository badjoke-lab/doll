name: CI

on:
  pull_request:

permissions:
  contents: read

jobs:
  inspect-payload:
    runs-on: ubuntu-latest
    steps:
      - name: Check out implementation branch
        uses: actions/checkout@v4
        with:
          ref: imp-050-model-manifests-bindings
          fetch-depth: 0

      - name: Inspect staged payload
        shell: bash
        run: |
          base64 --decode scripts/imp050_payload/00 > /tmp/imp050-payload.tar.gz
          sha256sum /tmp/imp050-payload.tar.gz
          gzip --test /tmp/imp050-payload.tar.gz
          tar -tzf /tmp/imp050-payload.tar.gz
