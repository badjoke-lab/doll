name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Apply IMP-045 finalization
        run: |
          python scripts/finalize_imp045.py
          rm .github/workflows/imp045-finalize.yml scripts/finalize_imp045.py

      - name: Verify dependency lock
        run: uv lock --check

      - name: Install project
        run: uv sync --dev --locked

      - name: Format finalized workspace
        run: uv run ruff format .

      - name: Lint
        run: uv run ruff check .

      - name: Check formatting
        run: uv run ruff format --check .

      - name: Type check
        run: uv run mypy src tests

      - name: Check generated specification
        run: uv run python scripts/build_final_spec.py --check

      - name: Check public project status
        run: node scripts/check-public-site-status.mjs

      - name: Upload finalized IMP-045 files
        uses: actions/upload-artifact@v4
        with:
          name: imp045-finalized-files
          path: |
            DOLL_FINAL_SPEC.md
            docs/implementation/imp-045-resume-bundle.md
            docs/spec/09-development-roadmap.md
            scripts/check-public-site-status.mjs
            src/doll/project_cli.py
            src/doll/resume_bundle.py
            tests/test_resume_bundle.py
            tests/test_resume_bundle_hardening.py
            website/project-status.json
          if-no-files-found: error

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Apply IMP-045 finalization
        shell: bash
        run: |
          python scripts/finalize_imp045.py
          rm .github/workflows/imp045-finalize.yml scripts/finalize_imp045.py

      - name: Install project
        run: uv sync --dev --locked

      - name: Run tests
        run: uv run python scripts/run_ci_tests.py

      - name: Upload pytest output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-output-${{ runner.os }}
          path: pytest-output.txt
          if-no-files-found: error

      - name: Check CLI help
        run: uv run doll --help

      - name: Check module CLI help
        run: uv run python -m doll --help
