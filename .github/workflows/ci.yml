name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Resolve dependency lock
        run: uv lock

      - name: Install project
        run: uv sync --dev

      - name: Lint
        run: uv run ruff check .

      - name: Check formatting
        run: uv run ruff format --check .

      - name: Type check
        run: uv run mypy src tests

      - name: Check generated specification
        run: uv run python scripts/build_final_spec.py --check

      - name: Upload dependency lock
        uses: actions/upload-artifact@v4
        with:
          name: uv-lock
          path: uv.lock
          if-no-files-found: error

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install project
        run: uv sync --dev

      - name: Run tests
        run: uv run pytest

      - name: Check CLI help
        run: uv run doll --help

      - name: Check module CLI help
        run: uv run python -m doll --help
