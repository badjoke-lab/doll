name: Apply IMP-019 implementation

on:
  pull_request:

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'imp-019-instruction-origin'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - run: python -m base64 -d .github/imp019_apply.py.b64 > /tmp/imp019_apply.py
      - run: python /tmp/imp019_apply.py
      - run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m 'IMP-019: Implement instruction-origin boundary'
          git push origin HEAD:${{ github.head_ref }}
