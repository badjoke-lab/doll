name: Remove IMP-054 temporary files

on:
  push:
    branches:
      - imp-054-real-runtime-continuity-drill

permissions:
  contents: write

jobs:
  remove:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: imp-054-real-runtime-continuity-drill
      - name: Remove temporary files
        run: |
          rm -f scripts/apply_imp054_package_support.py
          rm -f docs/testing/imp054-cleanup-trigger.txt
          rm -f .github/workflows/imp-054-remove-temporary-files.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git diff --cached --check
          git commit -m "chore: remove IMP-054 temporary files"
          git push origin HEAD:imp-054-real-runtime-continuity-drill
