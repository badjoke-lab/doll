name: IMP-048 Materialize

on:
  push:
    branches:
      - imp-048-runtime-adapter-contract

permissions:
  contents: write

jobs:
  materialize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: imp-048-runtime-adapter-contract
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Decode staged implementation
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import base64
          import gzip
          import hashlib

          pairs = [
              (
                  Path('scripts/imp048_payload/runtime.gz.b64'),
                  Path('src/doll/runtime_adapter.py'),
                  'f82fcc41004dc9997bdadeb96858524dcb9fea3ed5890ebc550d49451f490949',
              ),
              (
                  Path('scripts/imp048_payload/tests.gz.b64'),
                  Path('tests/test_runtime_adapter.py'),
                  'b09b91e19484b1adf8230526a2fa1f563d299428f60400ddf58d792b5e84e4c6',
              ),
          ]
          for source, destination, expected in pairs:
              compressed = base64.b64decode(source.read_text(encoding='ascii'), validate=True)
              content = gzip.decompress(compressed)
              actual = hashlib.sha256(content).hexdigest()
              if actual != expected:
                  raise SystemExit(f'payload checksum mismatch for {destination}: {actual}')
              destination.parent.mkdir(parents=True, exist_ok=True)
              destination.write_bytes(content)
          PY

      - name: Validate implementation
        shell: bash
        run: |
          uv sync --dev --locked
          uv run ruff check src/doll/runtime_adapter.py tests/test_runtime_adapter.py tests/test_runtime_adapter_static.py
          uv run ruff format --check src/doll/runtime_adapter.py tests/test_runtime_adapter.py tests/test_runtime_adapter_static.py
          uv run mypy src/doll/runtime_adapter.py tests/test_runtime_adapter.py tests/test_runtime_adapter_static.py
          uv run pytest -q --no-cov tests/test_runtime_adapter.py tests/test_runtime_adapter_static.py

      - name: Commit materialized implementation
        shell: bash
        run: |
          rm -rf scripts/imp048_payload
          rm .github/workflows/imp048-materialize.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "IMP-048: add local runtime adapter contract"
          git push origin HEAD:imp-048-runtime-adapter-contract
