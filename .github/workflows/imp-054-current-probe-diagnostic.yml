name: Current IMP-054 probe diagnostic

on:
  push:
    branches:
      - imp-054-real-runtime-continuity-drill

permissions:
  contents: read
  issues: write

jobs:
  diagnose:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v6
      - run: uv sync --dev --locked
      - name: Run current synthetic probe
        env:
          PYTHONPATH: src:.
        run: |
          set +e
          uv run python - <<'PY' > /tmp/probe.txt 2>&1
          import tempfile
          import traceback
          from pathlib import Path

          import scripts.imp_054_runtime_probe as probe
          from doll.state_package_registry import get_authoritative_record_registry

          original_export = probe.state_package.export_state_package

          def diagnostic_export(repository, output_path):
              rows = repository.connection.execute(
                  "SELECT DISTINCT record_type FROM records ORDER BY record_type"
              ).fetchall()
              actual = {row[0] for row in rows}
              supported = set(get_authoritative_record_registry(2).record_types)
              print("record_types=", sorted(actual))
              print("unsupported_record_types=", sorted(actual - supported))
              return original_export(repository, output_path)

          probe.state_package.export_state_package = diagnostic_export

          try:
              with tempfile.TemporaryDirectory(prefix="doll-imp054-diagnostic-") as directory:
                  checks, evidence = probe.run(
                      Path(directory),
                      mode="ci",
                      primary_name=probe.PRIMARY_SYNTHETIC_MODEL,
                      fallback_name=probe.FALLBACK_SYNTHETIC_MODEL,
                      ollama_port=11434,
                  )
              print(checks)
              print(evidence)
          except BaseException:
              traceback.print_exc()
              raise
          PY
          echo $? > /tmp/probe-status.txt
      - name: Post bounded diagnostic
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          status=$(cat /tmp/probe-status.txt)
          {
            echo 'Temporary current IMP-054 record-type diagnostic (exit status:' "$status"').'
            echo
            echo '```text'
            cat /tmp/probe.txt
            echo '```'
          } > /tmp/comment.txt
          gh issue comment 169 --body-file /tmp/comment.txt
