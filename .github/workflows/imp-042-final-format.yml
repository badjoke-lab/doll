name: Format IMP-042 reciprocity test

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/imp-042-final-format.yml"

permissions:
  contents: write

jobs:
  format:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: imp-042-procedure-record
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v6
      - run: uv sync --dev --locked
      - name: Format and type check
        run: |
          uv run ruff check . --fix
          uv run ruff format .
          uv run ruff check .
          uv run mypy src tests
      - name: Commit formatting
        run: |
          rm .github/workflows/imp-042-final-format.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Format IMP-042 reciprocity test"
          git push origin HEAD:imp-042-procedure-record
