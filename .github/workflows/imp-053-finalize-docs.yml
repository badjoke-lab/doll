name: Finalize IMP-053 documentation

on:
  push:
    branches:
      - imp-053-streaming-conversation

permissions:
  contents: write

jobs:
  finalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: imp-053-streaming-conversation
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Advance IMP-053 documentation and status
        run: |
          python - <<'PY'
          from __future__ import annotations

          import json
          from pathlib import Path

          def replace_once(path: str, old: str, new: str) -> None:
              file = Path(path)
              text = file.read_text(encoding="utf-8")
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"{path}: expected one match, found {count}: {old[:80]!r}")
              file.write_text(text.replace(old, new), encoding="utf-8")

          roadmap = "docs/spec/09-development-roadmap.md"
          replace_once(roadmap, "- IMP-030 through IMP-052;", "- IMP-030 through IMP-053;")
          replace_once(
              roadmap,
              "plus explicit scope-local model switching, deterministic fallback offers, bounded synthetic smoke probes, previous-binding retention, and exact rollback, verified backup",
              "plus explicit scope-local model switching, deterministic fallback offers, bounded synthetic smoke probes, previous-binding retention, exact rollback, and bounded local streaming integration that keeps partial deltas transient while committing only terminally validated output through the canonical conversation path, verified backup",
          )
          replace_once(
              roadmap,
              "- IMP-052 never selects a fallback automatically, persists no probe response, rewrites no unrelated canonical state, and adds no schema migration or State Package format change;\n- no real runtime or model is connected, no user-side offline work is required through IMP-052, and no real-machine local-inference evidence is claimed;",
              "- IMP-052 never selects a fallback automatically, persists no probe response, rewrites no unrelated canonical state, and adds no schema migration or State Package format change;\n- IMP-053 connects the bounded local stream transcript to the existing canonical conversation path, keeps partial deltas transient, and commits one assistant message only after terminal identity, completion, non-blank, and secret-safety validation;\n- IMP-053 persists bounded error state without an assistant artifact or runtime-output origin for failed, cancelled, timed-out, malformed, blank, identity-mismatched, or secret-bearing stream results, and reuses duplicate-operation rejection and exact rollback;\n- no real runtime or model is connected, no user-side offline work is required through IMP-053, and no real-machine local-inference evidence is claimed;",
          )
          replace_once(
              roadmap,
              "Status: in progress through IMP-052.",
              "Status: in progress through IMP-053.",
          )
          replace_once(
              roadmap,
              "### Offline mode and local AI continuity drill",
              "### IMP-053 — Bounded local streaming conversation path\n\nStatus: complete in code; real-runtime evidence is deferred to the integrated drill.\n\nImplemented `LocalStreamingConversationService` above the accepted `LocalRuntimeBoundary.stream` contract. The service resolves one exact active binding, revalidates runtime and model manifests plus the adapter declaration, packages the current user instruction and selected context through the existing authority, prompt-injection, and secret controls, and returns a bounded presentation-only stream transcript that is excluded from object representation.\n\nPartial deltas are never persisted. Only a terminally valid, identity-matched, non-blank, secret-safe completed stream is committed through the existing IMP-051 canonical user, context-snapshot, and assistant artifact/event path. Failed, cancelled, timed-out, malformed, blank, identity-mismatched, resource-limited, or secret-bearing results create no assistant artifact, assistant event, or runtime-output instruction-origin record. Duplicate operation IDs fail closed and persistence failure removes every record and managed file created by the attempted turn.\n\nSchema version 3 and State Package v2 remain unchanged. CI uses injected synthetic adapters only and requires no user-side local or offline work. No browser, terminal, desktop live-rendering transport, real runtime, real model, runtime installation, process launch, model download, cloud request, credential retrieval, tool execution, capability execution, or project mutation is added.\n\n### Offline mode and local AI continuity drill",
          )
          replace_once(
              roadmap,
              "The required order after IMP-052 is:\n\n1. add streaming integration while keeping the canonical committed conversation-event and managed-artifact path authoritative;\n2. run the network-disabled real-runtime continuity drill before making a local-inference release claim;\n3. prove explicit fallback and model replacement on the primary machine without canonical conversation, project, memory, portability, backup, or recovery loss;\n4. prove a real local AI migration path before provider-specific cloud portability becomes a primary claim;\n5. keep cloud providers, credentials, and automatic cloud fallback outside the local continuity gate.",
              "The required order after IMP-053 is:\n\n1. run the network-disabled real-runtime continuity drill before making a local-inference release claim;\n2. prove explicit fallback and model replacement on the primary machine without canonical conversation, project, memory, portability, backup, or recovery loss;\n3. prove a real local AI migration path before provider-specific cloud portability becomes a primary claim;\n4. keep cloud providers, credentials, and automatic cloud fallback outside the local continuity gate.",
          )

          replace_once(
              "README.md",
              "Phases 4A and 4B are complete. Phase 5 is in progress through IMP-052: the runtime-independent adapter contract, loopback-only Ollama adapter, authoritative runtime/model manifests with explicit bindings, the first canonical non-streaming local conversation turn, and explicit scope-local model switching with offered fallback candidates and exact rollback are implemented. Switching uses bounded synthetic preflight and post-activation probes, preserves the previous binding, restores it after failed verification, and does not persist probe output or grant model authority. CI uses synthetic adapters only; no real runtime or model is connected, no user-side offline work is required for IMP-052, and no local-inference release claim is made. The current position is published through the [live implementation activity endpoint](https://doll.badjoke-lab.com/api/project-status). Streaming integration and the later network-disabled real-runtime continuity drill remain future bounded work. Unused legacy identifiers IMP-024 through IMP-029 are retired and are not reused.",
              "Phases 4A and 4B are complete. Phase 5 is in progress through IMP-053: the runtime-independent adapter contract, loopback-only Ollama adapter, authoritative runtime/model manifests with explicit bindings, canonical non-streaming local conversation execution, explicit scope-local model switching with offered fallback candidates and exact rollback, and bounded local streaming integration are implemented. Streaming output remains transient until a terminally valid, identity-matched, non-blank, secret-safe result is committed through the existing canonical conversation path; failure, cancellation, timeout, malformed output, and rejected output create no assistant artifact. CI uses synthetic adapters only; no real runtime or model is connected, no user-side offline work is required through IMP-053, and no local-inference release claim is made. The current position is published through the [live implementation activity endpoint](https://doll.badjoke-lab.com/api/project-status). The network-disabled real-runtime continuity drill remains the next bounded work. Unused legacy identifiers IMP-024 through IMP-029 are retired and are not reused.",
          )

          status_path = Path("website/project-status.json")
          status = json.loads(status_path.read_text(encoding="utf-8"))
          status["phase"]["next_implementation"] = 54
          status["model_runtime"]["message"] = (
              "IMP-053 integrates bounded local streaming with the canonical conversation path: "
              "partial deltas remain transient, and only terminally validated output becomes one "
              "assistant message. No real runtime or model is connected; the network-disabled "
              "real-runtime continuity drill remains."
          )
          status_path.write_text(
              json.dumps(status, ensure_ascii=False, indent=2) + "\n",
              encoding="utf-8",
          )

          checker = "scripts/check-public-site-status.mjs"
          replace_once(
              checker,
              "status.phase?.next_implementation === 53",
              "status.phase?.next_implementation === 54",
          )
          replace_once(
              checker,
              '"project-status.json must mark Phase 5 in progress from IMP-048 with IMP-053 next"',
              '"project-status.json must mark Phase 5 in progress from IMP-048 with IMP-054 next"',
          )
          replace_once(
              checker,
              "  roadmap.includes(\"The required order after IMP-052 is:\"),\n  \"roadmap must advance immediate work beyond IMP-052\",",
              "  roadmap.includes(\"IMP-053 connects the bounded local stream transcript\"),\n  \"roadmap must record the IMP-053 bounded streaming boundary\",\n);\nexpect(\n  roadmap.includes(\"The required order after IMP-053 is:\"),\n  \"roadmap must advance immediate work beyond IMP-053\",",
          )
          PY
          python scripts/build_final_spec.py
          node scripts/check-public-site-status.mjs
          python scripts/build_final_spec.py --check
      - name: Commit generated documentation
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add README.md DOLL_FINAL_SPEC.md docs/spec/09-development-roadmap.md website/project-status.json scripts/check-public-site-status.mjs
          git diff --cached --check
          git commit -m "IMP-053: advance roadmap and public status"
          git push origin HEAD:imp-053-streaming-conversation
