name: IMP-050 materialize

on:
  pull_request:

permissions:
  contents: write

jobs:
  materialize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: imp-050-model-manifests-bindings
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v6
      - name: Materialize files
        shell: bash
        run: |
          python - <<'PY'
          from hashlib import sha256
          from pathlib import Path
          chunks = []
          for path in sorted(Path('scripts/imp050_nibbles').glob('part.*')):
              text = path.read_text().strip()
              if path.suffix == '.rev':
                  text = text[::-1]
              elif path.suffix == '.rot':
                  text = ''.join(chr((ord(c) - 66) % 16 + 65) for c in text)
              chunks.append(text)
          encoded = ''.join(chunks)
          if len(encoded) % 2 or any(c < 'A' or c > 'P' for c in encoded):
              raise SystemExit('invalid staged data')
          data = bytes(((ord(encoded[i])-65)<<4)|(ord(encoded[i+1])-65) for i in range(0,len(encoded),2))
          actual = sha256(data).hexdigest()
          expected = 'a4ea089bcd0dd670d8c5311f5c5c580e2334617a199579eca4c8911e927f0b05'
          if actual != expected:
              raise SystemExit(f'checksum mismatch: {actual}')
          Path('/tmp/imp050.tar.gz').write_bytes(data)
          PY
          tar -tzf /tmp/imp050.tar.gz
          tar -xzf /tmp/imp050.tar.gz
          rm -rf scripts/imp050_nibbles scripts/imp050_payload
          rm -f scripts/imp050_snapshot_trigger.txt imp050-payload-diagnostic.txt
          rm -f .github/workflows/imp050-materialize.yml
          git checkout origin/main -- .github/workflows/ci.yml
      - name: Validate files
        shell: bash
        run: |
          uv sync --dev --locked
          uv run ruff check --fix src tests
          uv run ruff format src tests
          uv run python scripts/build_final_spec.py
          uv lock --check
          uv run ruff check .
          uv run ruff format --check .
          uv run mypy src tests
          uv run python scripts/build_final_spec.py --check
          node scripts/check-public-site-status.mjs
          uv run pytest -q --no-cov tests/test_model_manifest.py tests/test_model_manifest_static.py tests/test_state_migrations.py tests/test_state_package_registry.py tests/test_state_package_v2.py
          git diff --check
      - name: Commit files
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "IMP-050: add model manifests and explicit runtime bindings"
          git push origin HEAD:imp-050-model-manifests-bindings
