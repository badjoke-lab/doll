name: Apply IMP-020 implementation

on:
  pull_request:

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'imp-020-prompt-injection-defense'
    runs-on: ubuntu-latest
    steps:
      - name: Check out implementation branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Apply reviewed implementation payload
        run: python .github/imp020_apply.py

      - name: Commit implementation
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m 'IMP-020: Implement prompt injection defense'
          git push origin HEAD:${{ github.head_ref }}
