name: IMP-051 update status check

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  update:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: imp-051-canonical-local-conversation
          fetch-depth: 0
      - run: python scripts/imp051_update_status_check.py
      - run: node scripts/check-public-site-status.mjs
      - run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add scripts/check-public-site-status.mjs
          git commit -m "test: advance public status expectations to IMP-052"
          git push origin HEAD:imp-051-canonical-local-conversation
