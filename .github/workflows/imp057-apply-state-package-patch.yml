name: IMP-057 apply State Package patch

on:
  push:
    branches:
      - imp-057-local-portability-drill
    paths:
      - scripts/apply_imp_057_state_package_patch.py
      - .github/workflows/imp057-apply-state-package-patch.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: imp-057-local-portability-drill
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v6
      - run: uv sync --locked --all-extras
      - name: Apply reviewed patch
        run: uv run python scripts/apply_imp_057_state_package_patch.py
      - name: Normalize changed Python
        run: |
          uv run ruff check --fix src/doll/state_package.py src/doll/state_package_portability.py src/doll/state_package_portability_registry.py
          uv run ruff format src/doll/state_package.py src/doll/state_package_portability.py src/doll/state_package_portability_registry.py
          uv run python -m py_compile src/doll/state_package.py
      - name: Commit patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/doll/state_package.py src/doll/state_package_portability.py src/doll/state_package_portability_registry.py
          git commit -m "Extend State Package v2 for portability records"
          git push origin HEAD:imp-057-local-portability-drill
