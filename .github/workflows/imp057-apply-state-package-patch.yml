name: Local portability acceptance

on:
  pull_request:
    paths:
      - "src/doll/state_package.py"
      - "src/doll/state_package_portability.py"
      - "src/doll/state_package_portability_registry.py"
      - "scripts/imp_057_local_portability_probe.py"
      - "scripts/imp_057_state_inspector.py"
      - "scripts/run_imp_057_local_portability.py"
      - "docs/testing/phase-6-local-portability-matrix.json"
      - "tests/test_ollama_adapter_static.py"
      - ".github/workflows/imp057-apply-state-package-patch.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  acceptance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v6
      - run: uv sync --locked --all-extras
      - name: Run synthetic local-portability acceptance
        run: uv run python scripts/run_imp_057_local_portability.py --commit-sha "$(git rev-parse HEAD)"
