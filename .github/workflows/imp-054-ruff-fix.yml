name: Apply IMP-054 Ruff fixes

on:
  push:
    branches:
      - imp-054-real-runtime-continuity-drill

permissions:
  contents: write

jobs:
  fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: imp-054-real-runtime-continuity-drill
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v6
      - run: uv sync --dev --locked
      - run: |
          uv run ruff check --fix scripts/imp_054_runtime_probe.py scripts/imp_054_state_inspector.py scripts/run_imp_054_runtime_continuity.py tests/test_runtime_continuity_acceptance.py tests/test_runtime_continuity_acceptance_static.py
          uv run ruff format scripts/imp_054_runtime_probe.py scripts/imp_054_state_inspector.py scripts/run_imp_054_runtime_continuity.py tests/test_runtime_continuity_acceptance.py tests/test_runtime_continuity_acceptance_static.py
      - run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add scripts/imp_054_runtime_probe.py scripts/imp_054_state_inspector.py scripts/run_imp_054_runtime_continuity.py tests/test_runtime_continuity_acceptance.py tests/test_runtime_continuity_acceptance_static.py
          git diff --cached --check
          git commit -m "IMP-054: apply repository Python formatting"
          git push origin HEAD:imp-054-real-runtime-continuity-drill
