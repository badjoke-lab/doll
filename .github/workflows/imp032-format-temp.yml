name: IMP-032 temporary formatter

on:
  pull_request:

permissions:
  contents: read

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: astral-sh/setup-uv@v6
      - run: uv sync --dev --locked
      - run: uv run ruff check --fix src/doll/portability.py tests/test_portability_contracts.py tests/test_portability_contract_failures.py || true
      - run: uv run ruff format src/doll/portability.py tests/test_portability_contracts.py tests/test_portability_contract_failures.py
      - run: uv run ruff check --output-format=concise src/doll/portability.py tests/test_portability_contracts.py tests/test_portability_contract_failures.py > ruff.txt || true
      - uses: actions/upload-artifact@v4
        with:
          name: imp032-formatted-files
          path: |
            src/doll/portability.py
            tests/test_portability_contracts.py
            tests/test_portability_contract_failures.py
            ruff.txt
