  "roadmap must identify IMP-048 as the next implementation identifier",
);''',
          }
          for old, new in checker_replacements.items():
              if old not in checker:
                  raise SystemExit(f'missing checker replacement: {old[:100]}')
              checker = checker.replace(old, new)
          checker_path.write_text(checker, encoding='utf-8')
          PY

          uv sync --dev --locked
          uv run python scripts/build_final_spec.py
          uv run python scripts/build_final_spec.py --check
          uv run ruff format tests/test_project_continuity_acceptance.py tests/test_project_continuity_acceptance_static.py
          uv run ruff check .
          uv run mypy src tests
          node scripts/check-public-site-status.mjs
          uv run pytest -q tests/test_project_continuity_acceptance.py tests/test_project_continuity_acceptance_static.py
          git diff --check

      - name: Commit completion state
        shell: bash
        run: |
          rm .github/workflows/imp047-complete.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "docs: complete Phase 4B project-continuity gate"
          git push origin HEAD:imp-047-phase4b-completion
