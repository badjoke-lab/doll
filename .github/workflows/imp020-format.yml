name: Diagnose IMP-020 Ruff failures

on:
  pull_request:

permissions:
  contents: write

jobs:
  diagnose:
    if: github.head_ref == 'imp-020-prompt-injection-defense'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: astral-sh/setup-uv@v6
      - run: uv sync --locked
      - run: uv run ruff check . --output-format concise > .github/imp020-ruff.txt 2>&1 || true
      - run: rm -f .github/workflows/imp020-format.yml
      - run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m 'TEMP: record IMP-020 Ruff diagnostics'
          git push origin HEAD:${{ github.head_ref }}
