name: IMP-054 Ruff diagnostic

on:
  push:
    branches:
      - imp-054-real-runtime-continuity-drill

permissions:
  contents: read
  issues: write

jobs:
  diagnose:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v6
      - run: uv sync --dev --locked
      - name: Post bounded Ruff output
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set +e
          uv run ruff check . > /tmp/ruff.txt 2>&1
          status=$?
          {
            echo 'Temporary IMP-054 Ruff diagnostic (exit status:' "$status"').'
            echo
            echo '```text'
            cat /tmp/ruff.txt
            echo '```'
          } > /tmp/comment.txt
          gh issue comment 169 --body-file /tmp/comment.txt
