name: IMP-023 completion generator

on:
  push:
    branches:
      - docs/complete-imp-023-phase-3

permissions:
  contents: write

jobs:
  finalize:
    if: github.event.head_commit.message != 'Finalize IMP-023 Phase 3 completion'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Record accepted evidence
        run: python scripts/finalize_imp023.py
      - name: Regenerate combined specification
        run: python scripts/build_final_spec.py
      - name: Commit generated completion record
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add DOLL_FINAL_SPEC.md docs/spec/09-development-roadmap.md docs/testing/IMP-023-safety-acceptance.md docs/testing/phase-3-safety-matrix.json docs/testing/imp-023-primary-intel-mac-result.json
          git commit -m "Finalize IMP-023 Phase 3 completion"
          git push origin HEAD:docs/complete-imp-023-phase-3
