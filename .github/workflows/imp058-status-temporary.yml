name: Apply IMP-058 status updates

on:
  pull_request:
    paths:
      - .github/workflows/imp058-status-temporary.yml
      - .github/scripts/apply_imp058_status.py

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: imp-058-shutdown-escape-bundle
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v6
      - run: uv sync --locked --all-extras
      - name: Apply status and generated specification updates
        run: python .github/scripts/apply_imp058_status.py
      - name: Validate generated and public status files
        run: |
          uv run python scripts/build_final_spec.py --check
          node scripts/check-public-site-status.mjs
      - name: Validate bounded shutdown escape acceptance
        run: |
          uv run python scripts/run_imp_058_shutdown_escape.py --commit-sha "$(git rev-parse HEAD)"
          uv run pytest -q --no-cov tests/test_shutdown_escape.py tests/test_shutdown_escape_acceptance.py
      - name: Commit status updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add DOLL_FINAL_SPEC.md docs/spec/09-development-roadmap.md scripts/check-public-site-status.mjs website/project-status.json
          git commit -m "Update Phase 6 status for IMP-058"
          git push origin HEAD:imp-058-shutdown-escape-bundle
