name: WEB-008 regenerate specification

on:
  push:
    branches:
      - web/web-008-numbering-status
    paths:
      - "scripts/apply_web_008.py"
      - ".github/workflows/web-008-regenerate.yml"

permissions:
  contents: write

jobs:
  regenerate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: web/web-008-numbering-status
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Apply numbering migration
        run: python scripts/apply_web_008.py

      - name: Regenerate combined specification
        run: python scripts/build_final_spec.py

      - name: Validate generated specification
        run: python scripts/build_final_spec.py --check

      - name: Commit generated changes
        run: |
          if git diff --quiet; then
            echo "No generated changes."
            exit 0
          fi
          git diff --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md docs/spec/09-development-roadmap.md DOLL_FINAL_SPEC.md
          git commit -m "WEB-008: align numbering roadmap"
          git push origin HEAD:web/web-008-numbering-status
