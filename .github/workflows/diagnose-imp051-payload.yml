name: Diagnose IMP-051 payload assembly

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Check out IMP-051 branch
        uses: actions/checkout@v4
        with:
          ref: imp-051-canonical-local-conversation
          fetch-depth: 0

      - name: Inspect payload assembly
        shell: bash
        run: |
          mkdir -p diagnostic
          python - <<'PY' > diagnostic/report.txt 2>&1
          from __future__ import annotations

          import hashlib
          import json
          import tarfile
          from pathlib import Path

          def comma_values(path: Path) -> bytes:
              raw = path.read_text(encoding="ascii")
              values = tuple(int(value) for value in raw.split(","))
              print(json.dumps({
                  "path": str(path),
                  "characters": len(raw),
                  "values": len(values),
                  "minimum": min(values),
                  "maximum": max(values),
                  "raw_sha256": hashlib.sha256(raw.encode("ascii")).hexdigest(),
              }, sort_keys=True))
              return bytes(values)

          nibble_paths = tuple(Path(f"scripts/imp051_nibbles/part.{index:02d}") for index in range(5))
          encoded = "".join(path.read_text(encoding="ascii").strip() for path in nibble_paths)
          prefix = bytes(
              ((ord(encoded[index]) - 65) << 4) | (ord(encoded[index + 1]) - 65)
              for index in range(0, len(encoded), 2)
          )
          print(json.dumps({"segment": "nibbles", "bytes": len(prefix), "sha256": hashlib.sha256(prefix).hexdigest()}, sort_keys=True))

          decimal_values = tuple(int(value) for value in Path("scripts/imp051_decimal/part.00").read_text(encoding="ascii").split(","))
          decimal = bytes(decimal_values)
          print(json.dumps({"segment": "decimal", "bytes": len(decimal), "sha256": hashlib.sha256(decimal).hexdigest()}, sort_keys=True))

          xor_parts = []
          for index in range(2):
              path = Path(f"scripts/imp051_xor_decimal/part.{index:02d}")
              values = tuple(int(value) for value in path.read_text(encoding="ascii").split(","))
              decoded = bytes(value ^ 173 for value in values)
              xor_parts.append(decoded)
              print(json.dumps({"segment": f"xor-{index}", "bytes": len(decoded), "sha256": hashlib.sha256(decoded).hexdigest()}, sort_keys=True))

          plus_parts = {}
          for index in (0, 1, 3, 4):
              path = Path(f"scripts/imp051_plus_decimal/part.{index:02d}")
              values = tuple(int(value) for value in path.read_text(encoding="ascii").split(","))
              decoded = bytes(value - 3000 for value in values)
              plus_parts[index] = decoded
              print(json.dumps({"segment": f"plus-{index}", "bytes": len(decoded), "sha256": hashlib.sha256(decoded).hexdigest()}, sort_keys=True))

          alt_parts = []
          for name in ("part.02a", "part.02b"):
              path = Path(f"scripts/imp051_alt_decimal/{name}")
              values = tuple(int(value) for value in path.read_text(encoding="ascii").split(","))
              decoded = bytes((value - 7000) // 3 for value in values)
              alt_parts.append(decoded)
              print(json.dumps({"segment": f"alt-{name}", "bytes": len(decoded), "sha256": hashlib.sha256(decoded).hexdigest()}, sort_keys=True))

          payload = b"".join([
              prefix,
              decimal,
              *xor_parts,
              plus_parts[0],
              plus_parts[1],
              *alt_parts,
              plus_parts[3],
              plus_parts[4],
          ])
          payload_path = Path("diagnostic/payload.tar.gz")
          payload_path.write_bytes(payload)
          print(json.dumps({
              "payload_bytes": len(payload),
              "payload_sha256": hashlib.sha256(payload).hexdigest(),
              "header": payload[:16].hex(),
              "trailer": payload[-16:].hex(),
          }, sort_keys=True))
          try:
              with tarfile.open(payload_path, "r:gz") as bundle:
                  print(json.dumps({"members": [(member.name, member.size) for member in bundle.getmembers()]}, sort_keys=True))
          except Exception as exc:
              print(json.dumps({"tar_error_type": type(exc).__name__, "tar_error": str(exc)}, sort_keys=True))
          PY
          cat diagnostic/report.txt

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: imp051-assembly-report
          path: diagnostic/
          if-no-files-found: error
          retention-days: 1
