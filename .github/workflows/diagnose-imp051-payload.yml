name: Diagnose IMP-051 payload

on:
  push:
    branches:
      - diagnostic/imp-051-payload
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Decode staged payload
        shell: bash
        run: |
          mkdir -p diagnostic
          python - <<'PY'
          from __future__ import annotations

          import hashlib
          import json
          import zlib
          from pathlib import Path

          parts = sorted(Path("scripts/imp051_nibbles").glob("part.*"))
          encoded = "".join(part.read_text(encoding="utf-8").strip() for part in parts)
          alphabet = set(encoded)
          if not alphabet <= set("ABCDEFGHIJKLMNOP"):
              raise SystemExit("unexpected nibble alphabet")
          if len(encoded) % 2:
              raise SystemExit("odd nibble count")

          hex_text = "".join(format(ord(char) - ord("A"), "x") for char in encoded)
          compressed = bytes.fromhex(hex_text)
          Path("diagnostic/payload.gz").write_bytes(compressed)

          decoder = zlib.decompressobj(16 + zlib.MAX_WBITS)
          error_type = None
          error_message = None
          try:
              partial = decoder.decompress(compressed)
          except Exception as exc:
              partial = b""
              error_type = type(exc).__name__
              error_message = str(exc)
          Path("diagnostic/partial.decoded").write_bytes(partial)

          summary = {
              "parts": [part.name for part in parts],
              "encoded_chars": len(encoded),
              "compressed_bytes": len(compressed),
              "compressed_sha256": hashlib.sha256(compressed).hexdigest(),
              "compressed_header": compressed[:16].hex(),
              "compressed_trailer": compressed[-16:].hex(),
              "partial_decoded_bytes": len(partial),
              "partial_decoded_sha256": hashlib.sha256(partial).hexdigest(),
              "partial_decoded_header": partial[:32].hex(),
              "gzip_eof": decoder.eof,
              "gzip_unused_data_bytes": len(decoder.unused_data),
              "gzip_unconsumed_tail_bytes": len(decoder.unconsumed_tail),
              "error_type": error_type,
              "error_message": error_message,
          }
          Path("diagnostic/summary.json").write_text(
              json.dumps(summary, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          print(json.dumps(summary, sort_keys=True))
          PY

      - name: Upload diagnostic payload
        uses: actions/upload-artifact@v4
        with:
          name: imp051-payload-diagnostic
          path: diagnostic/
          if-no-files-found: error
          retention-days: 1
