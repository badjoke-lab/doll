name: Local writing real-machine acceptance

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/local-writing-real-machine-acceptance.yml
      - scripts/imp_064_local_writing_probe.py
      - scripts/run_imp_064_local_writing.py
      - src/doll/instruction_origin.py
      - src/doll/local_conversation.py
      - src/doll/local_writing.py
      - src/doll/model_manifest.py
      - src/doll/ollama_adapter.py
      - docs/testing/phase-6-daily-use-matrix.json
      - docs/testing/imp-064-primary-intel-mac-runbook.md
      - tests/test_imp_064_local_writing_acceptance.py
  pull_request:
    paths:
      - .github/workflows/local-writing-real-machine-acceptance.yml
      - scripts/imp_064_local_writing_probe.py
      - scripts/run_imp_064_local_writing.py
      - src/doll/instruction_origin.py
      - src/doll/local_conversation.py
      - src/doll/local_writing.py
      - src/doll/model_manifest.py
      - src/doll/ollama_adapter.py
      - docs/testing/phase-6-daily-use-matrix.json
      - docs/testing/imp-064-primary-intel-mac-runbook.md
      - tests/test_imp_064_local_writing_acceptance.py

permissions:
  contents: read

jobs:
  acceptance:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v6
      - run: uv sync --locked --all-extras
      - name: Run IMP-064 synthetic acceptance
        shell: bash
        run: |
          set -o pipefail
          uv run pytest -q --no-cov \
            tests/test_imp_064_local_writing_acceptance.py \
            2>&1 | tee imp064-local-writing-pytest.txt
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: imp064-local-writing-${{ matrix.os }}
          path: imp064-local-writing-pytest.txt
