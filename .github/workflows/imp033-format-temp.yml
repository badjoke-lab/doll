name: IMP-033 temporary formatter

on:
  pull_request:

permissions:
  contents: write

jobs:
  format:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'imp-033-portability-result-contracts' && github.event.pull_request.head.sha != ''
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: imp-033-portability-result-contracts
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: astral-sh/setup-uv@v6
      - run: uv sync --dev --locked
      - run: uv run ruff format src/doll/portability_records.py tests/test_portability_records.py tests/test_portability_record_failures.py
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Format IMP-033 files
          file_pattern: src/doll/portability_records.py tests/test_portability_records.py tests/test_portability_record_failures.py
