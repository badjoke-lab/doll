name: IMP-033 temporary formatter

on:
  pull_request:

permissions:
  contents: read

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: astral-sh/setup-uv@v6
      - run: uv sync --dev --locked
      - run: uv run ruff format src/doll/portability_records.py tests/test_portability_records.py tests/test_portability_record_failures.py
      - uses: actions/upload-artifact@v4
        with:
          name: imp033-formatted-files
          path: |
            src/doll/portability_records.py
            tests/test_portability_records.py
            tests/test_portability_record_failures.py
