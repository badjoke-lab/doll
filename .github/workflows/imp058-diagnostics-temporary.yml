name: IMP-058 diagnostics

on:
  push:
    branches:
      - imp-058-shutdown-escape-bundle
    paths:
      - .github/workflows/imp058-diagnostics-temporary.yml
  pull_request:
    paths:
      - .github/workflows/imp058-diagnostics-temporary.yml
      - scripts/imp_058_shutdown_escape_probe.py
      - scripts/run_imp_058_shutdown_escape.py
      - src/doll/shutdown_escape.py
      - src/doll/shutdown_escape_inspector.py
      - tests/test_shutdown_escape.py
      - tests/test_shutdown_escape_acceptance.py

permissions:
  contents: read

jobs:
  diagnostics:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v6
      - run: uv sync --locked --all-extras
      - name: Capture complete diagnostics
        shell: bash
        run: |
          set +e
          FILES="src/doll/shutdown_escape.py src/doll/shutdown_escape_inspector.py scripts/imp_058_shutdown_escape_probe.py scripts/run_imp_058_shutdown_escape.py tests/test_shutdown_escape.py tests/test_shutdown_escape_acceptance.py"
          uv run ruff check $FILES --output-format=concise > ruff.txt 2>&1
          echo $? > ruff.exit
          uv run ruff format --check --diff $FILES > format.txt 2>&1
          echo $? > format.exit
          uv run mypy $FILES > mypy.txt 2>&1
          echo $? > mypy.exit
          uv run pytest -q --no-cov tests/test_shutdown_escape.py tests/test_shutdown_escape_acceptance.py > pytest.txt 2>&1
          echo $? > pytest.exit
          uv run python scripts/run_imp_058_shutdown_escape.py --commit-sha "$(git rev-parse HEAD)" > runner.txt 2>&1
          echo $? > runner.exit
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: imp058-complete-diagnostics
          path: |
            ruff.txt
            ruff.exit
            format.txt
            format.exit
            mypy.txt
            mypy.exit
            pytest.txt
            pytest.exit
            runner.txt
            runner.exit
