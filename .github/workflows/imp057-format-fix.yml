name: IMP-057 apply formatting

on:
  push:
    branches:
      - imp-057-local-portability-drill
    paths:
      - ".github/workflows/imp057-format-fix.yml"

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: imp-057-local-portability-drill
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v6
      - run: uv sync --locked --all-extras
      - name: Format IMP-057 Python files
        run: |
          uv run ruff format scripts/imp_057_local_portability_probe.py scripts/imp_057_state_inspector.py scripts/run_imp_057_local_portability.py src/doll/state_package.py src/doll/state_package_portability.py src/doll/state_package_portability_registry.py tests/test_local_portability_acceptance.py tests/test_ollama_adapter_static.py
          uv run ruff check .
      - name: Commit formatting
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            exit 0
          fi
          git add scripts/imp_057_local_portability_probe.py scripts/imp_057_state_inspector.py scripts/run_imp_057_local_portability.py src/doll/state_package.py src/doll/state_package_portability.py src/doll/state_package_portability_registry.py tests/test_local_portability_acceptance.py tests/test_ollama_adapter_static.py
          git commit -m "Format IMP-057 implementation"
          git push origin HEAD:imp-057-local-portability-drill
