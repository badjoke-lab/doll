name: Diagnose IMP-002

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diagnose:
    if: github.event_name == 'workflow_dispatch' || github.head_ref == 'impl/imp-002-workspace-init'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Install project
        run: uv sync --dev --locked

      - name: Capture diagnostics
        shell: bash
        run: |
          mkdir -p diagnostics
          uv run ruff check . > diagnostics/ruff.txt 2>&1 || true
          uv run pytest -q > diagnostics/pytest.txt 2>&1 || true

      - name: Upload diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: imp-002-diagnostics
          path: diagnostics
          if-no-files-found: error
