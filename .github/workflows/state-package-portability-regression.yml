name: State Package portability regression

on:
  pull_request:
    paths:
      - "src/doll/state_package.py"
      - "src/doll/state_package_portability.py"
      - "src/doll/state_package_portability_registry.py"
      - "scripts/imp_057_local_portability_probe.py"
      - "scripts/imp_057_state_inspector.py"
      - "scripts/run_imp_057_local_portability.py"
      - "tests/test_local_portability_acceptance.py"
      - "tests/test_ollama_adapter_static.py"
      - "tests/test_state_package_portability.py"
      - "tests/test_state_package_registry.py"
      - ".github/workflows/state-package-portability-regression.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  regression:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v6
      - run: uv sync --locked --all-extras
      - run: uv run ruff check tests/test_state_package_portability.py tests/test_state_package_registry.py
      - run: uv run ruff format --check tests/test_state_package_portability.py tests/test_state_package_registry.py
      - run: uv run mypy src tests
      - run: uv run pytest -q --no-cov tests/test_local_portability_acceptance.py tests/test_ollama_adapter_static.py tests/test_state_package_portability.py tests/test_state_package_registry.py
