name: Format IMP-058 platform coverage tests

on:
  pull_request:
    paths:
      - .github/workflows/imp058-platform-coverage-format-temporary.yml

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: imp-058-shutdown-escape-bundle
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v6
      - run: uv sync --locked --all-extras
      - name: Apply canonical Ruff fixes
        run: |
          uv run ruff check --fix tests/test_shutdown_escape_platform_coverage.py
          uv run ruff format tests/test_shutdown_escape_platform_coverage.py
          uv run ruff check tests/test_shutdown_escape_platform_coverage.py
      - name: Commit formatted test
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tests/test_shutdown_escape_platform_coverage.py
          git commit -m "Format shutdown escape platform coverage tests"
          git push origin HEAD:imp-058-shutdown-escape-bundle
