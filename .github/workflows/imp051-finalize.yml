name: IMP-051 finalize

on:
  pull_request:

permissions:
  contents: write

jobs:
  finalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out implementation branch
        uses: actions/checkout@v4
        with:
          ref: imp-051-canonical-local-conversation
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Apply project-state updates
        run: python scripts/imp051_finalize.py

      - name: Install project
        run: uv sync --dev --locked

      - name: Generate combined specification
        run: uv run python scripts/build_final_spec.py

      - name: Remove temporary finalizer files
        shell: bash
        run: |
          rm scripts/imp051_finalize.py
          rm .github/workflows/imp051-finalize.yml

      - name: Validate finalized state
        shell: bash
        run: |
          uv run ruff check .
          uv run ruff format --check .
          uv run mypy src tests
          uv run python scripts/build_final_spec.py --check
          node scripts/check-public-site-status.mjs
          uv run python -m pytest -q --no-cov tests/test_local_conversation.py tests/test_local_conversation_static.py
          git diff --check

      - name: Commit finalized project state
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "docs: record IMP-051 canonical conversation state"
          git push origin HEAD:imp-051-canonical-local-conversation
