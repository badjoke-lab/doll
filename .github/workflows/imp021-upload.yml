name: Temporary IMP-021 payload installer

on:
  push:
    branches:
      - imp-021-capability-taxonomy
    paths:
      - .github/workflows/imp021-upload.yml

permissions:
  contents: write

jobs:
  install:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install implementation payload
        shell: bash
        run: |
          cat .github/imp021-payload.part1 .github/imp021-payload.part2 | base64 --decode > /tmp/imp021-payload.tar.gz
          tar -xzf /tmp/imp021-payload.tar.gz -C .
          python - <<'PY'
          from pathlib import Path

          path = Path("docs/spec/09-development-roadmap.md")
          text = path.read_text(encoding="utf-8")

          replacements = {
              "- IMP-001 through IMP-020;": "- IMP-001 through IMP-021;",
              "instruction-origin authority, and prompt-injection defense.": (
                  "instruction-origin authority, prompt-injection defense, capability taxonomy, "
                  "fixed risk tiers, and authorization preflight."
              ),
              "- IMP-020 is complete;\n- IMP-021 is the next implementation item;\n- IMP-021 through IMP-023 complete and validate the remaining safety boundary;": (
                  "- IMP-021 is complete;\n"
                  "- IMP-022 is the next implementation item;\n"
                  "- IMP-022 and IMP-023 complete and validate the remaining safety boundary;"
              ),
              (
                  "### IMP-021 — Capability Taxonomy and Risk Tiers\n\n"
                  "Implement a versioned capability registry, schemas, targets, side effects, limits, "
                  "permission and network checks, risk tiers, denial of malformed requests, and no "
                  "unrestricted shell."
              ): (
                  "### IMP-021 — Capability Taxonomy and Risk Tiers\n\n"
                  "Status: complete.\n\n"
                  "Implemented an immutable versioned capability registry, deterministic fingerprints, "
                  "fixed Tier 0 through Tier 3 classifications, bounded argument and target contracts, "
                  "exact side-effect and risk matching, target-to-permission binding, resource and timeout "
                  "limits, read-only permission preflight, explicit network policy, release exclusion, "
                  "secret-safe audit, Tier 3 denial pending IMP-022, and no unrestricted shell or arbitrary "
                  "command capability."
              ),
              "The required order after IMP-020 is:": "The required order after IMP-021 is:",
              (
                  "1. create and implement IMP-021 only;\n"
                  "2. continue IMP-022 and IMP-023 in order;\n"
                  "3. pass the Phase 3 safety gate;"
              ): (
                  "1. create and implement IMP-022 only;\n"
                  "2. continue IMP-023;\n"
                  "3. pass the Phase 3 safety gate;"
              ),
          }

          for old, new in replacements.items():
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"expected one roadmap match, found {count}: {old[:80]!r}")
              text = text.replace(old, new)

          path.write_text(text, encoding="utf-8", newline="\n")
          PY
          python scripts/build_final_spec.py

      - name: Commit implementation
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/doll/capabilities.py tests/test_capabilities.py tests/test_capabilities_coverage.py \
            docs/implementation/imp-021-capability-taxonomy-risk-tiers.md \
            docs/spec/09-development-roadmap.md DOLL_FINAL_SPEC.md
          git commit -m "IMP-021: implement capability taxonomy and risk tiers"
          git push origin HEAD:imp-021-capability-taxonomy
