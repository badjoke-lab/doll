name: IMP-046 Snapshot

on:
  push:
    branches:
      - imp-046-project-continuity-coverage

permissions:
  contents: read

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/upload-artifact@v4
        with:
          name: imp046-source-snapshot
          path: |
            src
            tests
            docs
            scripts
            pyproject.toml
            uv.lock
