name: IMP-068 status update

on:
  pull_request:
    paths:
      - scripts/apply_imp_068_status.py
      - .github/workflows/imp-068-status-update.yml

permissions:
  contents: write

jobs:
  update:
    if: github.event.pull_request.number == 220
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v6
      - run: uv sync --frozen
      - run: uv run ruff format scripts/apply_imp_068_status.py
      - run: uv run python scripts/apply_imp_068_status.py
      - run: uv run python scripts/build_final_spec.py
      - run: node scripts/check-public-site-status.mjs
      - run: uv run ruff check scripts/apply_imp_068_status.py
      - run: uv run ruff format --check scripts/apply_imp_068_status.py
      - name: Commit status updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "Record IMP-068 translation CI status"
          git push origin HEAD:${GITHUB_HEAD_REF}
