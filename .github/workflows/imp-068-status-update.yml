name: IMP-068 status update

on:
  pull_request:
    paths:
      - scripts/apply_imp_068_status.py
      - .github/workflows/imp-068-status-update.yml

permissions:
  contents: write

jobs:
  update:
    if: github.event.pull_request.number == 220
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v6
      - run: uv sync --frozen
      - run: uv run ruff format scripts/apply_imp_068_status.py
      - run: uv run python scripts/apply_imp_068_status.py
      - name: Normalize generated status text
        run: |
          python - <<'PY'
          from pathlib import Path

          implementation = Path("docs/implementation/imp-068-explicit-local-translation.md")
          text = implementation.read_text(encoding="utf-8")
          implementation.write_text(
              "\n".join(line.rstrip() for line in text.splitlines()) + "\n",
              encoding="utf-8",
          )

          checker = Path("scripts/check-public-site-status.mjs")
          text = checker.read_text(encoding="utf-8")
          old = '''  roadmap.includes("the next bounded implementation receives IMP-068 only when a new implementation issue is opened"),
            "roadmap must identify IMP-068 as the next unallocated implementation identifier",'''
          new = '''  roadmap.includes("the next bounded implementation receives IMP-069 only when a new implementation issue is opened"),
            "roadmap must identify IMP-069 as the next unallocated implementation identifier",'''
          if text.count(old) != 1:
              raise SystemExit("unexpected remaining implementation checker shape")
          checker.write_text(text.replace(old, new), encoding="utf-8")
          PY
      - run: uv run python scripts/build_final_spec.py
      - name: Capture public status checker
        run: node scripts/check-public-site-status.mjs > imp-068-checker.log 2>&1 || true
      - uses: actions/upload-artifact@v4
        with:
          name: imp-068-checker-log
          path: imp-068-checker.log
          if-no-files-found: error
      - name: Require public status checker
        run: |
          cat imp-068-checker.log
          grep -q '^public-site-status check passed$' imp-068-checker.log
      - name: Commit status updates
        run: |
          rm -f imp-068-checker.log
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "Record IMP-068 translation CI status"
          git push origin HEAD:${GITHUB_HEAD_REF}
