name: IMP-057 apply test formatting

on:
  push:
    branches:
      - imp-057-local-portability-drill
    paths:
      - "scripts/apply_imp_057_test_format_patch.py"
      - ".github/workflows/imp057-test-format-patch.yml"

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: imp-057-local-portability-drill
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v6
      - run: uv sync --locked --all-extras
      - name: Apply test formatting patch
        run: uv run python scripts/apply_imp_057_test_format_patch.py
      - name: Verify focused quality
        run: |
          uv run ruff check tests/test_state_package_portability.py tests/test_state_package_registry.py
          uv run ruff format --check tests/test_state_package_portability.py tests/test_state_package_registry.py
          uv run mypy src tests
          uv run pytest -q --no-cov tests/test_state_package_portability.py tests/test_state_package_registry.py
      - name: Commit test formatting
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tests/test_state_package_portability.py
          git commit -m "Format State Package portability tests"
          git push origin HEAD:imp-057-local-portability-drill
