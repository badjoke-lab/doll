name: Apply IMP-038 retry

on:
  push:
    branches:
      - imp-038-state-package-v2
    paths:
      - ".github/workflows/imp-038-apply-retry.yml"

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: imp-038-state-package-v2
          fetch-depth: 0

      - name: Apply implementation patches
        run: |
          git apply --check scripts/imp-038-state-package.patch
          git apply --check scripts/imp-038-roadmap-status.patch
          git apply scripts/imp-038-state-package.patch
          git apply scripts/imp-038-roadmap-status.patch

      - name: Regenerate specification and validate
        run: |
          python scripts/build_final_spec.py
          python -m compileall -q src tests
          node scripts/check-public-site-status.mjs
          git diff --check

      - name: Commit applied implementation
        run: |
          rm scripts/imp-038-state-package.patch
          rm scripts/imp-038-roadmap-status.patch
          rm .github/workflows/imp-038-apply.yml
          rm .github/workflows/imp-038-apply-retry.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "IMP-038: add state package v2 foundation"
          git push origin HEAD:imp-038-state-package-v2
