name: Diagnose IMP-044 tests

on:
  pull_request:
    branches: [main]
    paths: [.github/workflows/imp-044-pytest-diagnose.yml]

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: imp-044-derived-project-status
      - uses: astral-sh/setup-uv@v6
      - run: uv sync --dev --locked
      - run: |
          python scripts/imp_044_update_cli.py
          python scripts/imp_044_update_roadmap.py
          python scripts/imp_044_update_website_status.py
          python scripts/imp_044_update_checker.py
          python scripts/build_final_spec.py
          uv run ruff check . --fix --ignore E501
          uv run ruff format .
      - run: |
          set +e
          uv run pytest -q --no-cov tests/test_project_status.py tests/test_project_cli.py tests/test_checkpoint.py tests/test_work_item.py tests/test_procedure.py > docs/implementation/imp-044-pytest-diagnostic.txt 2>&1
          echo "exit_code=$?" >> docs/implementation/imp-044-pytest-diagnostic.txt
          exit 0
      - run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add docs/implementation/imp-044-pytest-diagnostic.txt
          git commit -m "TEMP: record IMP-044 pytest diagnostic"
          git push origin HEAD:imp-044-derived-project-status
