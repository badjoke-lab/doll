name: Clean IMP-058 temporary files

on:
  pull_request:
    paths:
      - .github/workflows/imp058-cleanup-temporary.yml

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: imp-058-shutdown-escape-bundle
      - name: Remove temporary implementation helpers
        run: |
          rm -f \
            .github/scripts/apply_imp058_status.py \
            .github/scripts/fix_imp058_line_lengths.py \
            .github/workflows/imp058-diagnostics-temporary.yml \
            .github/workflows/imp058-linefix-temporary.yml \
            .github/workflows/imp058-status-temporary.yml \
            .github/workflows/imp058-cleanup-temporary.yml
      - name: Commit cleanup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Remove IMP-058 temporary helpers"
          git push origin HEAD:imp-058-shutdown-escape-bundle
