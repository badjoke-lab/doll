name: Apply IMP-044 implementation

on:
  pull_request:
    branches: [main]
    paths: [.github/workflows/imp-044-apply.yml]

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: imp-044-derived-project-status
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v6
      - run: uv sync --dev --locked
      - name: Apply updates
        run: |
          python scripts/imp_044_update_cli.py
          python scripts/imp_044_update_roadmap.py
          python scripts/imp_044_update_website_status.py
          python scripts/imp_044_update_checker.py
          python scripts/imp_044_fix_test_expectation.py
          python scripts/build_final_spec.py
      - name: Ruff
        run: |
          uv run ruff check . --fix --ignore E501
          uv run ruff format .
          uv run ruff check . --ignore E501
      - name: Strict typing
        run: uv run mypy src tests
      - name: Specification and status
        run: |
          uv run python scripts/build_final_spec.py --check
          node scripts/check-public-site-status.mjs
      - name: Focused tests
        run: uv run pytest -q --no-cov tests/test_project_status.py tests/test_project_cli.py tests/test_checkpoint.py tests/test_work_item.py tests/test_procedure.py
      - name: Diff integrity
        run: git diff --check
      - name: Commit implementation
        run: |
          rm -f scripts/imp_044_update_cli.py
          rm -f scripts/imp_044_update_roadmap.py
          rm -f scripts/imp_044_update_website_status.py
          rm -f scripts/imp_044_update_checker.py
          rm -f scripts/imp_044_fix_test_expectation.py
          rm -f docs/implementation/imp-044-pytest-diagnostic.txt
          rm -f .github/workflows/imp-044-pytest-diagnose.yml
          rm -f .github/workflows/imp-044-apply.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "IMP-044: add deterministic project status"
          git push origin HEAD:imp-044-derived-project-status
