name: Diagnose IMP-058 mypy

on:
  pull_request:
    paths:
      - .github/workflows/imp058-mypy-diagnostic-temporary.yml
      - tests/test_shutdown_escape_platform_coverage.py

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v6
      - run: uv sync --locked --all-extras
      - name: Capture strict mypy output
        shell: bash
        run: |
          set +e
          uv run mypy tests/test_shutdown_escape_platform_coverage.py > mypy.txt 2>&1
          echo $? > mypy.exit
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: imp058-mypy-diagnostic
          path: |
            mypy.txt
            mypy.exit
