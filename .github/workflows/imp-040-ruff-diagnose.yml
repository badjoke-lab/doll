name: Diagnose IMP-040 Ruff

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/imp-040-ruff-diagnose.yml"

permissions:
  contents: write

jobs:
  diagnose:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: imp-040-project-record-v2
      - uses: astral-sh/setup-uv@v6
      - run: uv sync --dev --locked
      - name: Build generated implementation
        run: |
          python scripts/imp_040_prepare_source.py prepare
          python scripts/imp_040_update_project_state.py
          python scripts/imp_040_prepare_source.py cleanup
          python scripts/imp_040_update_package_status.py
          python scripts/build_final_spec.py
          uv run ruff check . --fix || true
          uv run ruff format .
      - name: Capture Ruff output
        run: |
          set +e
          uv run ruff check . > docs/implementation/imp-040-ruff-diagnostic.txt 2>&1
          echo "exit_code=$?" >> docs/implementation/imp-040-ruff-diagnostic.txt
          exit 0
      - name: Publish diagnostic
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/implementation/imp-040-ruff-diagnostic.txt
          git commit -m "TEMP: record IMP-040 Ruff diagnostic"
          git push origin HEAD:imp-040-project-record-v2
