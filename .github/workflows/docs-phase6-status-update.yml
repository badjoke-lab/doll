name: Apply Phase 6 status update

on:
  pull_request:
    branches:
      - main
    paths:
      - "scripts/update_public_check_after_imp057.py"
      - ".github/workflows/docs-phase6-status-update.yml"
  push:
    branches:
      - docs-phase6-status-after-imp057
    paths:
      - "scripts/update_public_check_after_imp057.py"
      - ".github/workflows/docs-phase6-status-update.yml"

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: docs-phase6-status-after-imp057
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Update public status validation
        run: python scripts/update_public_check_after_imp057.py
      - name: Check generated specification
        run: python scripts/build_final_spec.py --check
      - name: Check public status
        run: node scripts/check-public-site-status.mjs
      - name: Commit public status validation
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/check-public-site-status.mjs
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "Update public status validation after IMP-057"
          git push origin HEAD:docs-phase6-status-after-imp057
