name: Temporary IMP-021 lint fix

on:
  push:
    branches:
      - imp-021-capability-taxonomy
    paths:
      - .github/workflows/imp021-lint-fix.yml

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: imp-021-capability-taxonomy
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v6

      - name: Install project
        run: uv sync --dev --locked

      - name: Apply repository lint fixes
        run: |
          uv run ruff check src/doll/capabilities.py tests/test_capabilities.py tests/test_capabilities_coverage.py --fix --unsafe-fixes
          uv run ruff format src/doll/capabilities.py tests/test_capabilities.py tests/test_capabilities_coverage.py
          uv run ruff check src/doll/capabilities.py tests/test_capabilities.py tests/test_capabilities_coverage.py

      - name: Commit fixes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/doll/capabilities.py tests/test_capabilities.py tests/test_capabilities_coverage.py
          git commit -m "Fix IMP-021 lint findings"
          git push origin HEAD:imp-021-capability-taxonomy
