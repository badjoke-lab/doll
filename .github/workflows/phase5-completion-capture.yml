name: Phase 5 completion capture

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  capture:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: imp-054-phase5-completion
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: astral-sh/setup-uv@v6
      - name: Apply completion patch
        run: |
          python - <<'PY'
          from pathlib import Path
          import textwrap

          source = Path('.github/workflows/phase5-completion-finalize.yml').read_text(encoding='utf-8')
          marker = "          python - <<'PY'\n"
          block = source.split(marker, 1)[1].split("\n          PY", 1)[0]
          exec(compile(textwrap.dedent(block), '<phase5-completion-patch>', 'exec'))
          PY
      - run: uv sync --locked
      - run: uv run ruff format tests/test_runtime_continuity_acceptance.py tests/test_runtime_continuity_acceptance_static.py
      - run: uv run python scripts/build_final_spec.py
      - name: Capture public check
        run: |
          set +e
          node scripts/check-public-site-status.mjs > .github/phase5-public-check.log 2>&1
          echo "exit_code=$?" >> .github/phase5-public-check.log
          exit 0
      - name: Capture targeted tests
        run: |
          set +e
          uv run pytest tests/test_runtime_continuity_acceptance.py tests/test_runtime_continuity_acceptance_static.py > .github/phase5-pytest.log 2>&1
          echo "exit_code=$?" >> .github/phase5-pytest.log
          exit 0
      - name: Commit generated state and diagnostics
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add README.md docs/spec/09-development-roadmap.md DOLL_FINAL_SPEC.md website/project-status.json scripts/check-public-site-status.mjs tests/test_runtime_continuity_acceptance.py tests/test_runtime_continuity_acceptance_static.py .github/phase5-public-check.log .github/phase5-pytest.log
          git commit -m "Generate Phase 5 completion state"
          git push origin HEAD:imp-054-phase5-completion
