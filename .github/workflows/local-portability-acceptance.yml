name: Local portability acceptance

on:
  pull_request:
    paths:
      - "src/doll/state_package.py"
      - "src/doll/state_package_portability.py"
      - "src/doll/state_package_portability_registry.py"
      - "scripts/imp_057_local_portability_probe.py"
      - "scripts/imp_057_state_inspector.py"
      - "scripts/run_imp_057_local_portability.py"
      - "docs/testing/phase-6-local-portability-matrix.json"
      - "tests/test_local_portability_acceptance.py"
      - "tests/test_ollama_adapter_static.py"
      - ".github/workflows/local-portability-acceptance.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  acceptance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v6
      - run: uv sync --locked --all-extras
      - name: Run direct synthetic migration test
        shell: bash
        run: |
          set -o pipefail
          uv run pytest -q --no-cov tests/test_local_portability_acceptance.py 2>&1 | tee imp057-pytest.txt
      - name: Run bounded acceptance report
        run: uv run python scripts/run_imp_057_local_portability.py --commit-sha "$(git rev-parse HEAD)"
      - name: Upload acceptance diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: imp057-acceptance-diagnostics
          path: imp057-pytest.txt
