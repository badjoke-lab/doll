name: IMP-037 gate finalizer

on:
  push:
    branches:
      - imp-037-gate-completion

permissions:
  contents: write

jobs:
  finalize:
    if: github.actor == 'badjoke-lab'
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: imp-037-gate-completion
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate completed roadmap and combined specification
        run: |
          python - <<'PY'
          import runpy

          namespace = runpy.run_path('tests/test_imp037_gate_spec_diagnostic.py')
          try:
              namespace['test_emit_phase4a_completed_roadmap_and_spec']()
          except AssertionError:
              pass
          PY

      - name: Remove temporary generation files
        run: |
          rm tests/test_imp037_gate_spec_diagnostic.py
          rm tmp-pr-marker.txt
          rm .github/workflows/imp037-gate-finalizer.yml

      - name: Commit generated completion state
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add DOLL_FINAL_SPEC.md docs/spec/09-development-roadmap.md
          git add -u tests/test_imp037_gate_spec_diagnostic.py tmp-pr-marker.txt .github/workflows/imp037-gate-finalizer.yml
          git commit -m 'Finalize Phase 4A gate documentation'
          git push origin HEAD:imp-037-gate-completion
