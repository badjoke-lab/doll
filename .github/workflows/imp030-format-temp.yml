name: IMP-030 temporary formatter

on:
  push:
    branches:
      - imp-030-canonical-conversations

permissions:
  contents: write

jobs:
  format:
    if: github.event.head_commit.message != 'Format IMP-030 files'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: astral-sh/setup-uv@v6
      - run: uv sync --dev --locked
      - run: uv run ruff check --fix src/doll/state.py tests/test_safety_acceptance.py
      - run: uv run ruff format src/doll/state.py tests/test_safety_acceptance.py
      - name: Commit formatting
        run: |
          if git diff --quiet -- src/doll/state.py tests/test_safety_acceptance.py; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/doll/state.py tests/test_safety_acceptance.py
          git commit -m "Format IMP-030 files"
          git push origin HEAD:imp-030-canonical-conversations
