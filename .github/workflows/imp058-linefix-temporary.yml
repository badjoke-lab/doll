name: Diagnose IMP-058 line fix

on:
  push:
    branches:
      - imp-058-shutdown-escape-bundle
    paths:
      - .github/workflows/imp058-linefix-temporary.yml
  pull_request:
    paths:
      - .github/workflows/imp058-linefix-temporary.yml
      - .github/scripts/fix_imp058_line_lengths.py

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: imp-058-shutdown-escape-bundle
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v6
      - run: uv sync --locked --all-extras
      - name: Capture line-fix diagnostics
        shell: bash
        run: |
          set +e
          python .github/scripts/fix_imp058_line_lengths.py > fix.txt 2>&1
          echo $? > fix.exit
          uv run ruff format src/doll/shutdown_escape.py > format.txt 2>&1
          echo $? > format.exit
          uv run ruff check src/doll/shutdown_escape.py > ruff.txt 2>&1
          echo $? > ruff.exit
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: imp058-linefix-diagnostics
          path: |
            fix.txt
            fix.exit
            format.txt
            format.exit
            ruff.txt
            ruff.exit
            src/doll/shutdown_escape.py
