name: Fix IMP-058 line length

on:
  push:
    branches:
      - imp-058-shutdown-escape-bundle
    paths:
      - .github/workflows/imp058-linefix-temporary.yml
  pull_request:
    paths:
      - .github/workflows/imp058-linefix-temporary.yml
      - .github/scripts/fix_imp058_line_lengths.py

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: imp-058-shutdown-escape-bundle
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v6
      - run: uv sync --locked --all-extras
      - name: Apply exact line-length fixes
        run: |
          python .github/scripts/fix_imp058_line_lengths.py
          uv run ruff format src/doll/shutdown_escape.py
          uv run ruff check src/doll/shutdown_escape.py
      - name: Commit line-length fixes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/doll/shutdown_escape.py
          git commit -m "Fix IMP-058 line lengths"
          git push origin HEAD:imp-058-shutdown-escape-bundle
