name: Apply IMP-018 implementation

on:
  pull_request:

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'imp-018-claim-evidence-trust'
    runs-on: ubuntu-latest
    steps:
      - name: Check out implementation branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Reconstruct and apply reviewed implementation
        shell: bash
        run: |
          cat \
            .github/imp018-payload/part-00 \
            .github/imp018-payload/part-01 \
            .github/imp018-payload/part-02 \
            .github/imp018-payload/part-030 \
            .github/imp018-payload/part-0310 \
            .github/imp018-payload/part-0311 \
            .github/imp018-payload/part-040 \
            .github/imp018-payload/part-041 \
            .github/imp018-payload/part-050 \
            .github/imp018-payload/part-0510 \
            > /tmp/imp018-changes.b64
          rev .github/imp018-payload/part-0511r-a >> /tmp/imp018-changes.b64
          cat .github/imp018-payload/part-06 >> /tmp/imp018-changes.b64
          base64 -d /tmp/imp018-changes.b64 > /tmp/imp018-changes.tar.gz
          echo 'd04e8bf7faac29b513c4dabad74a0e1c82071c20b6bda359135090dd7c1fa216  /tmp/imp018-changes.tar.gz' | sha256sum -c -
          tar -xzf /tmp/imp018-changes.tar.gz -C .
          rm -rf .github/imp018-payload
          rm -f .github/workflows/imp018-source-snapshot.yml
          rm -f .github/workflows/imp018-apply.yml

      - name: Commit implementation
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'IMP-018: Implement claim, evidence, and trust model'
          git push origin HEAD:${{ github.head_ref }}
