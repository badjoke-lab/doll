name: Fix IMP-040 legacy coverage expectation

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/imp-040-legacy-coverage-fix.yml"

permissions:
  contents: write

jobs:
  fix:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: imp-040-project-record-v2
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v6
      - run: uv sync --dev --locked
      - name: Update legacy schema defense expectations
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("tests/test_project_coverage.py")
          text = path.read_text(encoding="utf-8")
          old_version = "            replace(record, schema_version=2),\n"
          new_version = "            replace(record, schema_version=3),\n"
          old_corrupt = '''        with pytest.raises(ProjectDecisionCorruptError):
              _project_from_record(replace(record, title="different"))
          '''
          new_corrupt = '''        with pytest.raises(ProjectDecisionCorruptError):
              _project_from_record(replace(record, title="different"))
          with pytest.raises(ProjectDecisionCorruptError):
              _project_from_record(replace(record, schema_version=2))
          '''
          if text.count(old_version) != 1 or text.count(old_corrupt) != 1:
              raise SystemExit("legacy coverage anchors changed")
          path.write_text(
              text.replace(old_version, new_version).replace(old_corrupt, new_corrupt),
              encoding="utf-8",
          )
          PY
      - name: Verify focused coverage behavior
        run: |
          uv run ruff check tests/test_project_coverage.py
          uv run ruff format --check tests/test_project_coverage.py
          uv run mypy tests/test_project_coverage.py
          uv run pytest -q --no-cov tests/test_project_coverage.py::test_project_decision_envelope_defense_branches
      - name: Commit fix
        run: |
          rm .github/workflows/imp-040-legacy-coverage-fix.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Update ProjectRecord schema defense coverage"
          git push origin HEAD:imp-040-project-record-v2
