name: Phase 5 completion generator

on:
  push:
    branches:
      - imp-054-phase5-completion

permissions:
  contents: write

jobs:
  finalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: imp-054-phase5-completion
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: astral-sh/setup-uv@v6
      - name: Update completion status
        run: |
          python - <<'PY'
          from pathlib import Path
          import json
          import re

          def replace_once(path: str, old: str, new: str) -> None:
              target = Path(path)
              text = target.read_text(encoding="utf-8")
              if text.count(old) != 1:
                  raise SystemExit(f"unexpected replacement count for {path}: {text.count(old)}")
              target.write_text(text.replace(old, new), encoding="utf-8")

          roadmap_path = Path("docs/spec/09-development-roadmap.md")
          roadmap = roadmap_path.read_text(encoding="utf-8")
          roadmap = roadmap.replace(
              "- Phase 4B project continuity foundation;\n- IMP-001 through IMP-023;",
              "- Phase 4B project continuity foundation;\n- Phase 5 local runtime and model integration;\n- IMP-001 through IMP-023;",
              1,
          )
          roadmap, count = re.subn(
              r"^- local workspace, SQLite state, migrations, managed artifacts, preferences, policies, permissions, confirmed memory, projects, decisions,.*$",
              "- local workspace, SQLite state, migrations, managed artifacts, canonical conversation and project state, State Package v2, backup and restore, the model-independent safety boundary, AI-environment portability, project continuity, runtime-independent adapter contracts, a loopback-only Ollama adapter, authoritative runtime and model manifests, explicit bindings, canonical local conversation and streaming, explicit fallback switching, exact rollback, and accepted primary Intel Mac offline continuity evidence through IMP-054.",
              roadmap,
              count=1,
              flags=re.MULTILINE,
          )
          if count != 1:
              raise SystemExit("roadmap completed summary replacement failed")

          current_pattern = re.compile(
              r"- Phase 5 local runtime and model integration is now the active foundation phase;.*?- model execution must continue through the Phase 3 safety boundary and the Phase 4A/4B canonical state contracts\.",
              re.DOTALL,
          )
          current_replacement = """- Phase 5 passed its local-runtime continuity gate on 2026-06-28;
          - accepted real-machine evidence is bound to commit `1a5b66b2417d6f3e1eafcd14d2769e9c15d7f96c` on the primary Intel Mac with networking disabled;
          - IMP-048 through IMP-054 establish the runtime contract, loopback-only Ollama adapter, authoritative manifests and bindings, canonical local conversation and streaming, explicit fallback switching, exact rollback, State Package v2 transfer, backup restore, and accepted LRUN-001 through LRUN-012 evidence;
          - Phase 6 local AI portability and daily-use integration is now ready;
          - the first bounded Phase 6 implementation issue receives IMP-055 when opened;
          - later local migration, cloud, and tool work must continue through the Phase 3 safety boundary and the Phase 4A/4B canonical state contracts."""
          roadmap, count = current_pattern.subn(current_replacement, roadmap, count=1)
          if count != 1:
              raise SystemExit("roadmap current-state replacement failed")

          roadmap = roadmap.replace(
              "Status: automated acceptance evidence implemented through IMP-054; primary Intel Mac gate pending.",
              "Status: complete through IMP-054.",
              1,
          )
          deferred = "Status: complete in code; real-runtime evidence is deferred to the integrated drill."
          if roadmap.count(deferred) != 3:
              raise SystemExit(f"unexpected deferred status count: {roadmap.count(deferred)}")
          roadmap = roadmap.replace(
              deferred,
              "Status: complete; accepted real-machine evidence is provided by IMP-054.",
          )
          roadmap = roadmap.replace(
              "Status: complete in code; real-machine evidence is deferred to the integrated drill.",
              "Status: complete; accepted real-machine evidence is provided by IMP-054.",
              1,
          )
          roadmap = roadmap.replace(
              "Status: automated harness implemented; primary Intel Mac evidence pending.",
              "Status: accepted; primary Intel Mac offline evidence stored.",
              1,
          )
          roadmap = roadmap.replace(
              "The implementation does not install or start Ollama, download or delete models, use cloud providers, retrieve credentials, execute tools or capabilities, migrate schema, or change State Package v2. Phase 5 remains incomplete until a separate completion PR stores accepted primary Intel Mac evidence from the exact merged implementation commit.",
              "The accepted run used the exact merged implementation commit on Darwin `x86_64` with networking disabled, two preinstalled local model revisions, and explicit local-only confirmation. It did not install or start Ollama, download or delete models, use cloud providers, retrieve credentials, execute tools or capabilities, migrate schema, or change State Package v2.",
              1,
          )

          offline_pattern = re.compile(
              r"### Offline mode and local AI continuity drill\n\n.*?(?=## 12\. Phase 6)",
              re.DOTALL,
          )
          offline_replacement = """### Accepted Phase 5 evidence

          - implementation commit: `1a5b66b2417d6f3e1eafcd14d2769e9c15d7f96c`;
          - the primary Intel Mac run passed on Darwin `x86_64`, Python 3.12.13, with networking disabled;
          - the accepted local runtime was Ollama 0.30.11 through adapter `ollama.local` 1.0.0;
          - all declared LRUN-001 through LRUN-012 checks passed;
          - explicit fallback switching, exact rollback, State Package v2 transfer, backup restore, and fresh-process continuity passed;
          - the accepted report returned `phase5_gate_complete = true`;
          - the stored result contains no native model names, prompt or response text, private paths, usernames, hostnames, credentials, secret values, or private fixture content.

          Phase 5 gate status: passed on 2026-06-28.

          Phase 5 gate:

          - local inference remains optional to state inspection, project status, Resume Bundle export, backup, restore, and recovery;
          - model replacement does not rewrite unrelated state;
          - canonical conversation and project state survive runtime-private object removal;
          - the safety boundary remains the only route to side effects and authoritative project mutation;
          - no cloud credential or provider is required.

          """
          roadmap, count = offline_pattern.subn(offline_replacement, roadmap, count=1)
          if count != 1:
              raise SystemExit("roadmap accepted-evidence replacement failed")

          immediate_pattern = re.compile(
              r"## 18\. Immediate work\n\n.*?(?=## 19\. Roadmap change control)",
              re.DOTALL,
          )
          immediate_replacement = """## 18. Immediate work

          The required order after the Phase 5 gate is:

          1. open the first bounded Phase 6 local-AI portability issue as IMP-055;
          2. select one local AI environment actually used by the project owner and implement its source adapter against the Phase 4A contract;
          3. prove inventory, source provenance, duplicate prevention, quarantine, explicit mapping, and loss reporting with synthetic data before any private migration drill;
          4. prove that imported canonical state remains usable after the original local application is disabled or removed;
          5. keep provider-specific cloud portability, credentials, tools, and automatic cloud fallback outside the local migration gate.

          """
          roadmap, count = immediate_pattern.subn(immediate_replacement, roadmap, count=1)
          if count != 1:
              raise SystemExit("roadmap immediate-work replacement failed")
          roadmap_path.write_text(roadmap, encoding="utf-8")

          readme_path = Path("README.md")
          readme = readme_path.read_text(encoding="utf-8")
          readme_pattern = re.compile(
              r"^Phases 4A and 4B are complete\. Phase 5 has automated acceptance evidence through IMP-054:.*?Unused legacy identifiers IMP-024 through IMP-029 are retired and are not reused\.$",
              re.MULTILINE,
          )
          readme_replacement = (
              "Phases 4A, 4B, and 5 are complete. Phase 5 passed its primary Intel Mac offline gate on 2026-06-28 using exact implementation commit `1a5b66b2417d6f3e1eafcd14d2769e9c15d7f96c`: real loopback-only Ollama health and inventory, canonical non-streaming and bounded streaming conversation, explicit fallback switching, exact rollback, State Package v2 transfer, backup restore, and fresh-process inspection without runtime adapters all passed. No cloud credential, external network request, model download, runtime installation, tool execution, or autonomous project mutation was used. Phase 6 local AI portability and daily-use integration is ready, with IMP-055 as the next implementation identifier when its bounded issue is opened. The current position is published through the [live implementation activity endpoint](https://doll.badjoke-lab.com/api/project-status). Unused legacy identifiers IMP-024 through IMP-029 are retired and are not reused."
          )
          readme, count = readme_pattern.subn(readme_replacement, readme, count=1)
          if count != 1:
              raise SystemExit("README completion replacement failed")
          readme_path.write_text(readme, encoding="utf-8")

          status = {
              "schema_version": 2,
              "maturity": "Pre-alpha",
              "completed_phases": ["0", "1", "2", "3", "4A", "4B", "5"],
              "phase": {
                  "id": "6",
                  "name": "Local AI portability and daily-use integration",
                  "state": "ready",
                  "started_by_implementation": None,
                  "next_implementation": 55,
              },
              "model_runtime": {
                  "connected": True,
                  "message": "Phase 5 is complete. Real loopback-only Ollama conversation, streaming, explicit fallback switching, exact rollback, State Package v2 transfer, backup restore, and offline continuity passed on the primary Intel Mac. Phase 6 local AI portability is ready.",
              },
              "last_reviewed": "2026-06-28",
          }
          Path("website/project-status.json").write_text(
              json.dumps(status, indent=2) + "\n",
              encoding="utf-8",
          )

          checker_path = Path("scripts/check-public-site-status.mjs")
          checker = checker_path.read_text(encoding="utf-8")
          checker = checker.replace(
              'Array.isArray(status.completed_phases) && status.completed_phases.includes("4B"),\n  "project-status.json must record completed phases through Phase 4B",',
              'Array.isArray(status.completed_phases) && status.completed_phases.includes("5"),\n  "project-status.json must record completed phases through Phase 5",',
              1,
          )
          old_phase = '''status.phase?.id === "5" &&
              status.phase?.name === "Local runtime and model integration" &&
              status.phase?.state === "in_progress" &&
              status.phase?.started_by_implementation === 48 &&
              status.phase?.next_implementation === 54,
            "project-status.json must mark Phase 5 in progress from IMP-048 with IMP-054 next",'''
          new_phase = '''status.phase?.id === "6" &&
              status.phase?.name === "Local AI portability and daily-use integration" &&
              status.phase?.state === "ready" &&
              status.phase?.started_by_implementation === null &&
              status.phase?.next_implementation === 55,
            "project-status.json must mark Phase 6 ready with IMP-055 next",'''
          if checker.count(old_phase) != 1:
              raise SystemExit("public status phase expectation replacement failed")
          checker = checker.replace(old_phase, new_phase)
          checker = checker.replace(
              "  'data-roadmap-phase=\"5\"',\n  \"data-roadmap-state\",",
              "  'data-roadmap-phase=\"5\"',\n  'data-roadmap-phase=\"6\"',\n  \"data-roadmap-state\",",
              1,
          )
          checker = checker.replace(
              '''expect(
            roadmap.includes("The required order after automated IMP-054 evidence is:"),
            "roadmap must advance immediate work to the IMP-054 real-machine gate",
          );''',
              '''expect(
            roadmap.includes("Phase 5 gate status: passed on 2026-06-28."),
            "roadmap must record the accepted Phase 5 gate",
          );
          expect(
            roadmap.includes("the first bounded Phase 6 implementation issue receives IMP-055 when opened"),
            "roadmap must identify IMP-055 as the next implementation identifier",
          );
          expect(
            roadmap.includes("The required order after the Phase 5 gate is:"),
            "roadmap must advance immediate work to Phase 6",
          );''',
              1,
          )
          checker_path.write_text(checker, encoding="utf-8")
          PY
      - run: uv sync --locked
      - run: uv run ruff format tests/test_runtime_continuity_acceptance.py tests/test_runtime_continuity_acceptance_static.py
      - run: uv run ruff check tests/test_runtime_continuity_acceptance.py tests/test_runtime_continuity_acceptance_static.py
      - run: uv run python scripts/build_final_spec.py
      - run: node scripts/check-public-site-status.mjs
      - run: uv run pytest tests/test_runtime_continuity_acceptance.py tests/test_runtime_continuity_acceptance_static.py
      - name: Commit generated completion state
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add README.md docs/spec/09-development-roadmap.md DOLL_FINAL_SPEC.md website/project-status.json scripts/check-public-site-status.mjs tests/test_runtime_continuity_acceptance.py tests/test_runtime_continuity_acceptance_static.py
          git commit -m "Publish completed Phase 5 gate"
          git push origin HEAD:imp-054-phase5-completion
