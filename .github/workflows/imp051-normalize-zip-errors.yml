name: IMP-051 normalize ZIP errors

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  update:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: imp-051-canonical-local-conversation
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v6
      - run: uv sync --dev --locked
      - name: Apply ZIP read normalization
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('src/doll/state_package.py')
          text = path.read_text(encoding='utf-8')
          if 'import zlib\n' not in text:
              text = text.replace('import zipfile\n', 'import zipfile\nimport zlib\n', 1)
          if '        zlib.error,\n' not in text:
              text = text.replace('        zipfile.LargeZipFile,\n    ) as exc:\n', '        zipfile.LargeZipFile,\n        zlib.error,\n    ) as exc:\n', 1)
          path.write_text(text, encoding='utf-8')
          PY
          uv run python -m pytest -q --no-cov tests/test_project_continuity_transfer.py::test_secret_workspace_backup_and_corrupt_package_leave_no_partial_target
      - name: Commit fix
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/doll/state_package.py
          git commit -m "fix: normalize corrupt state-package ZIP errors"
          git push origin HEAD:imp-051-canonical-local-conversation
