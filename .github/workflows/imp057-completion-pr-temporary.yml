name: Validate IMP-057 completion draft

on:
  pull_request:
    paths:
      - .github/scripts/apply_imp057_completion.py
      - .github/workflows/imp057-completion-pr-temporary.yml
      - docs/testing/results/IMP-057-primary-intel-mac-2026-06-29.json

permissions:
  contents: read

jobs:
  build-and-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v6
      - run: python .github/scripts/apply_imp057_completion.py
      - run: uv sync --locked --all-extras
      - run: uv run python scripts/build_final_spec.py --check
      - run: node scripts/check-public-site-status.mjs
      - run: uv run python scripts/run_imp_057_local_portability.py --commit-sha "$(git rev-parse HEAD)"
      - run: >-
          uv run pytest -q --no-cov
          tests/test_local_portability_acceptance.py
          tests/test_ollama_adapter_static.py
          tests/test_state_package_portability.py
          tests/test_state_package_registry.py
      - uses: actions/upload-artifact@v4
        with:
          name: imp057-completion-files
          path: |
            DOLL_FINAL_SPEC.md
            docs/implementation/imp-057-local-portability-migration-drill.md
            docs/spec/09-development-roadmap.md
            docs/testing/phase-6-local-portability-matrix.json
            scripts/check-public-site-status.mjs
            website/project-status.json
