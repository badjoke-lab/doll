name: Format IMP-058 files

on:
  push:
    branches:
      - imp-058-shutdown-escape-bundle
    paths:
      - .github/workflows/imp058-format-temporary.yml
  pull_request:
    paths:
      - .github/workflows/imp058-format-temporary.yml

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: imp-058-shutdown-escape-bundle
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v6
      - run: uv sync --locked --all-extras
      - name: Apply Ruff fixes and formatting
        run: |
          uv run ruff check --fix src/doll/shutdown_escape.py src/doll/shutdown_escape_inspector.py tests/test_shutdown_escape.py || true
          uv run ruff format src/doll/shutdown_escape.py src/doll/shutdown_escape_inspector.py tests/test_shutdown_escape.py
      - name: Commit formatted files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/doll/shutdown_escape.py src/doll/shutdown_escape_inspector.py tests/test_shutdown_escape.py
          git diff --cached --quiet && exit 0
          git commit -m "Format IMP-058 implementation"
          git push origin HEAD:imp-058-shutdown-escape-bundle
